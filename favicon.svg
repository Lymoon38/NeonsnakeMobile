<svg viewBox="0 0 260 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="go" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gs" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fond -->
  <rect width="260" height="120" fill="#050510" rx="10"/>
  <!-- Grille -->
  <g stroke="#00ffff07" stroke-width="0.5">
    <line x1="0" y1="30" x2="260" y2="30"/><line x1="0" y1="60" x2="260" y2="60"/><line x1="0" y1="90" x2="260" y2="90"/>
    <line x1="40" y1="0" x2="40" y2="120"/><line x1="80" y1="0" x2="80" y2="120"/><line x1="120" y1="0" x2="120" y2="120"/>
    <line x1="160" y1="0" x2="160" y2="120"/><line x1="200" y1="0" x2="200" y2="120"/><line x1="240" y1="0" x2="240" y2="120"/>
  </g>
  <!-- Orbes déco -->
  <circle cx="245" cy="25" r="5"   fill="#ff00aa" opacity="0.85" filter="url(#go)"/>
  <circle cx="20"  cy="98" r="4"   fill="#ffaa00" opacity="0.80" filter="url(#go)"/>
  <circle cx="14"  cy="40" r="3.5" fill="#aa00ff" opacity="0.70" filter="url(#go)"/>
  <circle cx="120" cy="110" r="4"  fill="#00ffff" opacity="0.60" filter="url(#go)"/>
  <!-- Corps arc-en-ciel -->
  <circle cx="28"  cy="92" r="8"  fill="hsl(300,100%,52%)" opacity="0.22"/>
  <circle cx="46"  cy="95" r="10" fill="hsl(275,100%,52%)" opacity="0.35"/>
  <circle cx="65"  cy="94" r="12" fill="hsl(250,100%,52%)" opacity="0.48"/>
  <circle cx="83"  cy="89" r="13" fill="hsl(225,100%,52%)" opacity="0.60" filter="url(#gs)"/>
  <circle cx="99"  cy="80" r="14" fill="hsl(200,100%,52%)" opacity="0.70"/>
  <circle cx="112" cy="69" r="14" fill="hsl(175,100%,52%)" opacity="0.78"/>
  <circle cx="121" cy="56" r="14" fill="hsl(150,100%,52%)" opacity="0.84" filter="url(#gs)"/>
  <circle cx="126" cy="42" r="14" fill="hsl(125,100%,52%)" opacity="0.89"/>
  <circle cx="129" cy="28" r="14" fill="hsl(100,100%,52%)" opacity="0.93"/>
  <circle cx="136" cy="15" r="14" fill="hsl(75,100%,52%)"  opacity="0.96" filter="url(#gs)"/>
  <circle cx="149" cy="7"  r="14" fill="hsl(50,100%,52%)"  opacity="0.98"/>
  <circle cx="163" cy="6"  r="14" fill="hsl(25,100%,52%)"  opacity="0.99"/>
  <circle cx="177" cy="11" r="14" fill="hsl(5,100%,52%)"   opacity="1.00" filter="url(#gs)"/>
  <circle cx="190" cy="21" r="14" fill="hsl(345,100%,52%)" opacity="1.00"/>
  <circle cx="200" cy="34" r="14" fill="hsl(320,100%,52%)" opacity="1.00" filter="url(#gs)"/>
  <!-- Tête -->
  <circle cx="214" cy="50" r="16" fill="#1a0030" filter="url(#gs)"/>
  <circle cx="214" cy="50" r="14" fill="hsl(295,100%,52%)" filter="url(#gs)"/>
  <!-- Yeux -->
  <circle cx="200" cy="36" r="12" fill="white"/>
  <circle cx="228" cy="36" r="12" fill="white"/>
  <!-- Pupilles -->
  <circle cx="204" cy="36" r="5" fill="#111"/>
  <circle cx="232" cy="36" r="5" fill="#111"/>
  <!-- Reflets -->
  <circle cx="202" cy="34" r="2" fill="white" opacity="0.65"/>
  <circle cx="230" cy="34" r="2" fill="white" opacity="0.65"/>
  <!-- Bouche -->
  <line x1="208" y1="66" x2="220" y2="66" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <!-- Halo tête -->
  <circle cx="214" cy="50" r="14.5" fill="none" stroke="#cc00ff" stroke-width="1.2" opacity="0.55" filter="url(#go)"/>
  <!-- Particules -->
  <circle cx="236" cy="34" r="2.2" fill="#ff00ff" opacity="0.75" filter="url(#go)"/>
  <circle cx="232" cy="67" r="1.8" fill="#00ffff" opacity="0.65" filter="url(#go)"/>
  <circle cx="194" cy="33" r="1.8" fill="#ff8800" opacity="0.60" filter="url(#go)"/>
  <circle cx="238" cy="52" r="1.5" fill="#ffff00" opacity="0.50"/>
</svg>
