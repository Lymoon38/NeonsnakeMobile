<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>NeonSnake</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;color:#00ffff;font-family:'Courier New',monospace;user-select:none;}

/* ══ LOBBY ══ */
#lobby{
  position:fixed;inset:0;background:#000;z-index:100;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  transition:opacity .8s;overflow-y:auto;padding:.8rem 0;gap:.55rem;
}
#lobby h1{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.8rem,7vw,3.8rem);color:#00ffff;
  text-shadow:0 0 20px #00ffff,0 0 50px #00ffff33;
  margin:0;letter-spacing:.1em;
}
.sub{font-size:.75rem;color:#00ffff44;letter-spacing:.3em;margin:0;}
.lform{display:flex;flex-direction:column;align-items:center;gap:.6rem;width:100%;max-width:420px;padding:0 1rem;}
.fl{font-size:.7rem;color:#00ffff77;letter-spacing:.12em;align-self:flex-start;}
.lform input[type=text]{
  width:100%;padding:.55rem .9rem;font-size:1rem;font-family:'Courier New',monospace;
  background:#00ffff0d;border:1px solid #00ffff33;border-radius:.5rem;
  color:#00ffff;outline:none;text-align:center;transition:border .3s;
}
.lform input[type=text]:focus{border-color:#00ffff;}
.lform input::placeholder{color:#00ffff22;}
#lobby-best{font-size:.75rem;color:#00ffff55;}

/* Skins */
.sgrid{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;}
.sk{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;position:relative;display:flex;align-items:center;justify-content:center;font-size:.75rem;}
.sk:hover{transform:scale(1.15);}
.sk.sel{border-color:#fff!important;transform:scale(1.1);}
.sk.locked{opacity:.28;cursor:not-allowed;filter:grayscale(1);}
.sk.locked::after{content:'🔒';position:absolute;font-size:.5rem;bottom:-1px;right:-1px;}
.sk.rainbow{background:conic-gradient(red,orange,yellow,green,cyan,blue,violet,red);}
#skin-hint{color:#00ff8877;font-size:.6rem;}

/* Fond picker */
.bgrid{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;}
.bgp{width:56px;height:38px;border-radius:6px;cursor:pointer;border:2px solid #333;transition:transform .14s,border-color .14s;display:flex;align-items:center;justify-content:center;font-size:.48rem;color:#fff;text-align:center;line-height:1.3;}
.bgp:hover{transform:scale(1.08);}
.bgp.sel{border-color:#00ffff!important;}

#play-btn{
  padding:.8rem 0;font-size:1.2rem;color:#000;background:#00ffff;
  border:none;border-radius:.8rem;cursor:pointer;width:100%;
  font-family:'Courier New',monospace;box-shadow:0 0 14px #00ffff44;
  transition:transform .14s,background .2s;margin-top:.2rem;
}
#play-btn:hover{background:#00e0e0;transform:scale(1.03);}
#play-btn:active{transform:scale(.97);}

/* ══ HUD ══ */
#score{position:fixed;top:10px;left:10px;font-size:clamp(1rem,3vw,1.35rem);z-index:15;display:none;color:#00ffff;text-shadow:0 0 8px #00ffff;}
#status-bar{position:fixed;top:44px;left:10px;font-size:clamp(.65rem,2vw,.82rem);z-index:15;display:none;color:#00ffff;line-height:1.6;}

/* Classement */
#leaderboard{
  position:fixed;top:10px;right:10px;z-index:20;display:none;
  background:#000000bb;border:1px solid #00ffff22;border-radius:.6rem;
  padding:.45rem .75rem;min-width:140px;font-size:clamp(.62rem,1.8vw,.75rem);line-height:1.65;
}
.lb-title{color:#00ffff;font-weight:bold;letter-spacing:.1em;font-size:.68rem;margin-bottom:.15rem;}
.lb-row{display:flex;justify-content:space-between;gap:.6rem;}
.lb-row.me{color:#00ffff;text-shadow:0 0 5px #00ffff;}
.lb-row.other{color:#ffffff88;}

/* ══ CONTRÔLES AUDIO — haut droite ══ */
#audio-ctrl{
  position:fixed;top:10px;right:160px;z-index:21;display:none;
  align-items:center;gap:6px;
  background:#00000099;border:1px solid #00ffff22;border-radius:20px;
  padding:4px 12px;
}
#audio-ctrl label{font-size:.68rem;color:#00ffff77;white-space:nowrap;}
#vol-slider{width:60px;accent-color:#00ffff;}
#next-track-btn{
  background:none;border:1px solid #00ffff44;border-radius:12px;
  color:#00ffff;font-size:.65rem;cursor:pointer;padding:2px 8px;
  font-family:'Courier New',monospace;white-space:nowrap;
  transition:background .18s;
}
#next-track-btn:hover{background:#00ffff22;}
#track-name{font-size:.6rem;color:#00ffff55;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Boost bar */
#boost-info{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  display:none;background:#000000aa;border:1px solid #ff00ff22;
  border-radius:20px;padding:4px 14px;pointer-events:none;z-index:20;
  font-size:.68rem;color:#ff00ff88;white-space:nowrap;
}

/* Zone notif */
#zone-msg{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Orbitron',sans-serif;font-size:clamp(1rem,3vw,1.4rem);color:#00ff88;
  text-shadow:0 0 20px #00ff88;pointer-events:none;z-index:30;
  opacity:0;transition:opacity .4s;display:none;text-align:center;
}

/* Minimap */
#minimap{position:fixed;bottom:10px;right:10px;border:2px solid #00ffff33;background:rgba(0,0,0,.7);z-index:10;border-radius:4px;}

/* ══ GAME OVER ══ */
#go-screen{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:50;
  justify-content:center;align-items:center;flex-direction:column;gap:.45rem;
  color:#00ffff;font-family:'Courier New',monospace;
}
#go-screen h2{font-size:clamp(1.8rem,6vw,3rem);color:#ff4444;text-shadow:0 0 20px #ff4444;margin:0;}
#kill-msg{font-size:.9rem;color:#ff8844;min-height:1.1em;text-align:center;}
.go-score-line{font-size:1.1rem;color:#00ffff;}
.go-inner{background:#ffffff07;border:1px solid #00ffff22;border-radius:1rem;padding:1rem 1.3rem;width:90%;max-width:340px;display:flex;flex-direction:column;align-items:center;gap:.55rem;}
.go-inner label{font-size:.75rem;color:#00ffff77;}
.go-inner input{font-size:1rem;padding:.4rem .7rem;border-radius:.5rem;border:none;text-align:center;width:170px;box-shadow:0 0 8px #00ffff;}
.go-btns{display:flex;gap:.5rem;width:100%;}
.go-btns button{flex:1;padding:.65rem .4rem;font-size:.95rem;color:#000;background:#00ffff;border:none;border-radius:.6rem;box-shadow:0 0 10px #00ffff33;cursor:pointer;transition:background .18s,transform .14s;font-family:'Courier New',monospace;}
.go-btns button:hover{background:#00e0e0;transform:scale(1.03);}
.go-btns .lb-btn{background:#ffffff18;color:#00ffff;box-shadow:none;border:1px solid #00ffff33;}
.go-btns .lb-btn:hover{background:#00ffff22;}
#go-hs{font-size:.82rem;color:#00ffff88;width:100%;}
#go-hs ol{margin:.25rem 0 0;padding-left:1.2rem;}
#go-hs li{margin:.18rem 0;color:#00ffff;}

/* Skin notif */
#skin-notif{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:#00ff8820;border:1px solid #00ff88;border-radius:.6rem;padding:.45rem 1rem;font-size:.85rem;color:#00ff88;z-index:40;display:none;font-family:'Orbitron',sans-serif;text-align:center;}

/* Mobiles */
#joy-zone{position:fixed;bottom:75px;left:16px;width:100px;height:100px;display:none;touch-action:none;z-index:15;}
#joy-base{width:100%;height:100%;border-radius:50%;border:2px solid #00ffff22;background:#00ffff07;position:relative;}
#joy-thumb{position:absolute;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,#00ffff66,#00ffff11);border:2px solid #00ffff44;top:50%;left:50%;transform:translate(-50%,-50%);}
#boost-mob{position:fixed;bottom:75px;right:16px;width:66px;height:66px;border-radius:50%;background:radial-gradient(circle,#ff00ff1a,#ff00ff07);border:2px solid #ff00ff44;color:#ff00ff;font-family:'Orbitron',sans-serif;font-size:.5rem;font-weight:700;display:none;align-items:center;justify-content:center;text-align:center;z-index:15;cursor:pointer;box-shadow:0 0 8px #ff00ff1a;touch-action:none;transition:background .1s;}
#boost-mob.on{background:radial-gradient(circle,#ff00ff55,#ff00ff22);box-shadow:0 0 18px #ff00ff;}
#boost-mob span{pointer-events:none;line-height:1.3;}

canvas{display:block;}
#gc{border:8px solid #00ffff;box-shadow:0 0 30px #00ffff66;}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>NeonSnake</h1>
  <p class="sub">SURVIVE · DEVOUR · DOMINATE</p>
  <div id="lobby-best"></div>
  <div class="lform">
    <span class="fl">TON NOM</span>
    <input id="sname" type="text" placeholder="Joueur" maxlength="12" autocomplete="off"/>

    <span class="fl">SKIN <span id="skin-hint"></span></span>
    <div class="sgrid" id="skin-picker"></div>

    <span class="fl">FOND DE MAP</span>
    <div class="bgrid" id="bgpicker">
      <div class="bgp sel" data-bg="tri"   style="background:linear-gradient(135deg,#0f0f0f,#181818)">▲<br>Tri</div>
      <div class="bgp"     data-bg="hex"   style="background:#071007">⬡<br>Hex</div>
      <div class="bgp"     data-bg="dots"  style="background:#030308">·<br>Dots</div>
      <div class="bgp"     data-bg="lava"  style="background:linear-gradient(135deg,#1a0500,#0a0000)">🔥<br>Lava</div>
      <div class="bgp"     data-bg="space" style="background:linear-gradient(180deg,#000010,#000518)">🌌<br>Space</div>
      <div class="bgp"     data-bg="neon"  style="background:radial-gradient(ellipse,#001828,#000)">✦<br>Néon</div>
    </div>

    <button id="play-btn">▶ Jouer</button>
  </div>
</div>

<!-- HUD -->
<div id="score">Score: 0</div>
<div id="status-bar"></div>
<div id="leaderboard"><div class="lb-title">🏆 CLASSEMENT</div><div id="lb-rows"></div></div>
<div id="boost-info">⚡ BOOST — perd taille</div>
<div id="zone-msg">🌿 ZONE DE CROISSANCE !</div>

<!-- AUDIO CTRL — haut droite -->
<div id="audio-ctrl">
  <label>🔊</label>
  <input id="vol-slider" type="range" min="0" max="1" step="0.01" value="0.5"/>
  <button id="next-track-btn">⏭ SUIVANT</button>
  <span id="track-name"></span>
</div>

<canvas id="gc"></canvas>
<canvas id="minimap" width="130" height="130"></canvas>

<div id="joy-zone"><div id="joy-base"><div id="joy-thumb"></div></div></div>
<div id="boost-mob"><span>⚡<br>BOOST</span></div>
<div id="skin-notif"></div>

<!-- GAME OVER -->
<div id="go-screen">
  <h2>GAME OVER</h2>
  <div id="kill-msg"></div>
  <div class="go-score-line">Score : <span id="go-sc">0</span></div>
  <div class="go-inner">
    <label>Ton pseudo :</label>
    <input id="player-name" type="text" placeholder="Anonyme" maxlength="12"/>
    <div id="go-hs"><b>Top Scores :</b><br>Pas encore de scores</div>
    <div class="go-btns">
      <button id="replay-btn">↺ Rejouer</button>
      <button class="lb-btn" id="lobby-btn">⚙ Lobby</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  NeonSnake v7
//  FIXES :
//  ✔ IA réécrite — bots se comportent comme de vrais joueurs
//    (wander fluide, pas d'anti-spin bloquant, chasse agressive)
//  ✔ Joueur grandit naturellement en mangeant, POP uniquement au boost
//  ✔ Boost : seul moment où le serpent perd de la taille
//  ✔ 15 bots avec réapparition continue
//  ✔ Jauge volume + bouton musique en haut à droite
//  ✔ Gestion multi-pistes dans assets/
// ═══════════════════════════════════════════════════════════════

// ── MUSIQUES ─────────────────────────────────────────────────
// Ajoute tes fichiers dans assets/ et liste-les ici :
const TRACKS = [
  'assets/neon-gaming.mp3',
  // 'assets/synthwave.mp3',
  // 'assets/cyberpunk.mp3',
];
let trackIdx = 0;
const bgm = new Audio();
bgm.loop = true;
bgm.volume = 0.5;

function loadTrack(idx) {
  trackIdx = ((idx % TRACKS.length) + TRACKS.length) % TRACKS.length;
  const wasPlaying = !bgm.paused;
  bgm.src = TRACKS[trackIdx];
  bgm.load();
  document.getElementById('track-name').textContent =
    TRACKS[trackIdx].split('/').pop().replace(/\.[^.]+$/, '');
  if (wasPlaying) bgm.play().catch(() => {});
}
loadTrack(0);

document.addEventListener('click', () => bgm.play().catch(() => {}), { once: true });
document.addEventListener('touchstart', () => bgm.play().catch(() => {}), { once: true });

document.getElementById('vol-slider').addEventListener('input', e => { bgm.volume = e.target.value; });
document.getElementById('next-track-btn').addEventListener('click', () => {
  loadTrack(trackIdx + 1);
  bgm.play().catch(() => {});
});

// ── REFS ──────────────────────────────────────────────────────
const canvas    = document.getElementById('gc');
const ctx       = canvas.getContext('2d');
const mmEl      = document.getElementById('minimap');
const mmCtx     = mmEl.getContext('2d');
const scoreEl   = document.getElementById('score');
const statusBar = document.getElementById('status-bar');
const goEl      = document.getElementById('go-screen');
const lobbyEl   = document.getElementById('lobby');
const goHsEl    = document.getElementById('go-hs');
const pnEl      = document.getElementById('player-name');
const killMsgEl = document.getElementById('kill-msg');
const volSl     = document.getElementById('vol-slider');
const bInfoEl   = document.getElementById('boost-info');
const joyZone   = document.getElementById('joy-zone');
const joyThumb  = document.getElementById('joy-thumb');
const boostMob  = document.getElementById('boost-mob');
const lbRows    = document.getElementById('lb-rows');
const zoneMsgEl = document.getElementById('zone-msg');
const skinNotif = document.getElementById('skin-notif');
const lbEl      = document.getElementById('leaderboard');
const audioCtrl = document.getElementById('audio-ctrl');

// ── CONSTANTES ────────────────────────────────────────────────
const WW = 5000, WH = 5000;
const BASE_SPD = 2.4;
const SNAKE_BASE_R = 9;
const SNAKE_MAX_R  = 22;
const SNAKE_GROW_K = 0.016;
// Taille de départ et gain par orbe
const PLAYER_START_LEN = 8;
const GROW_PER_ORB = 5;       // segments ajoutés par orbe mangé
const GROW_PER_BONUS = 12;    // segments pour orbe bonus
const ORB_COUNT  = 240;
const OBS_COUNT  = 22;
const BOT_COUNT  = 15;        // 15 bots
const MAX_SN     = 800;
// Boost : le SEUL moment où le serpent perd de la taille
const BOOST_SHRINK_RATE = 0.18; // segments perdus/frame pendant boost
const BOOST_ORB_RATE    = 0.35;
const BOOST_SPD_MULT    = 1.75;
const IFRAMES   = 80;
const GZ_COUNT  = 4, GZ_MULT = 2.5;

// ── ÉTAT ─────────────────────────────────────────────────────
let running = false, raf = null, fc = 0, score = 0;
let snake, cam, ldir, mouse = { x: 0, y: 0 }, mmoved = false, isTouching = false;
let orbs, obsts, bots, growthZones;
let bonA = false, bonT = 0, gfA = false, gfT = 0, slA = false, slT = 0;
let bA = false, bSA = 0, bOrbAcc = 0;
// pendingGrow : segments à ajouter progressivement (sans pop)
let pendingGrow = 0;
let inv = 0, inGZ = false;
let pname = 'Joueur', scol = 'rainbow', bgchoice = 'tri';
let isMob = false, joyAct = false, joyOrig = { x: 0, y: 0 }, joyDelta = { x: 0, y: 0 };
let flashA = 0, zoneMsgTimer = null;

// ── RAYON dynamique ──────────────────────────────────────────
function snakeR(len) {
  return Math.min(SNAKE_BASE_R + len * SNAKE_GROW_K, SNAKE_MAX_R);
}

// ══════════════════════════════════════════════
//  SKINS
// ══════════════════════════════════════════════
const SKINS = [
  { id: 'rainbow', label: '🌈', style: 'rainbow',   unlock: 0,   desc: 'Arc-en-ciel' },
  { id: 'cyan',    label: '',   style: '#00ffff',   unlock: 0,   desc: 'Cyan' },
  { id: 'pink',    label: '',   style: '#ff0088',   unlock: 0,   desc: 'Rose' },
  { id: 'green',   label: '',   style: '#00ff88',   unlock: 0,   desc: 'Vert' },
  { id: 'orange',  label: '',   style: '#ffaa00',   unlock: 0,   desc: 'Orange' },
  { id: 'purple',  label: '',   style: '#aa00ff',   unlock: 0,   desc: 'Violet' },
  { id: 'red',     label: '',   style: '#ff4400',   unlock: 0,   desc: 'Rouge' },
  { id: 'white',   label: '',   style: '#ffffff',   unlock: 0,   desc: 'Blanc' },
  { id: 'fire',    label: '🔥', style: 'fire',      unlock: 30,  desc: 'Feu (30 pts)' },
  { id: 'ice',     label: '❄️', style: 'ice',       unlock: 60,  desc: 'Glace (60 pts)' },
  { id: 'gold',    label: '✨', style: 'gold',      unlock: 100, desc: 'Or (100 pts)' },
  { id: 'void',    label: '🌑', style: 'voidSkin',  unlock: 150, desc: 'Néant (150 pts)' },
  { id: 'plasma',  label: '⚡', style: 'plasma',    unlock: 200, desc: 'Plasma (200 pts)' },
];
function skinColor(style, i) {
  if (style === 'rainbow')  return `hsl(${(i * 8 + score * 4) % 360},100%,52%)`;
  if (style === 'fire')     return `hsl(${(i * 6) % 55 + 5},100%,55%)`;
  if (style === 'ice')      return `hsl(${195 + (i * 4) % 25},85%,68%)`;
  if (style === 'gold')     return `hsl(${48 + (i * 2) % 18},100%,55%)`;
  if (style === 'voidSkin') return `hsl(${275 + (i * 5) % 40},75%,${32 + i % 18}%)`;
  if (style === 'plasma')   return `hsl(${(i * 14) % 360},100%,55%)`;
  return style;
}
function getData() {
  const d = JSON.parse(localStorage.getItem('nsData') || '{}');
  return { best: d.best || 0, unlocked: d.unlocked || ['rainbow','cyan','pink','green','orange','purple','red','white'], total: d.total || 0 };
}
function saveData(pts) {
  const d = getData();
  d.best = Math.max(d.best, pts); d.total = (d.total || 0) + pts;
  SKINS.forEach(s => { if (s.unlock > 0 && d.best >= s.unlock && !d.unlocked.includes(s.id)) d.unlocked.push(s.id); });
  localStorage.setItem('nsData', JSON.stringify(d));
  return d;
}
let prevUnlocked = [];
function checkUnlocks() {
  const d = saveData(score);
  SKINS.forEach(s => { if (s.unlock > 0 && d.unlocked.includes(s.id) && !prevUnlocked.includes(s.id)) showSkinNotif(s.desc); });
  prevUnlocked = [...d.unlocked];
}
function showSkinNotif(desc) {
  skinNotif.textContent = '🎉 Skin débloqué : ' + desc;
  skinNotif.style.display = 'block';
  setTimeout(() => skinNotif.style.display = 'none', 3000);
}
function buildSkinPicker() {
  const d = getData(), g = document.getElementById('skin-picker');
  g.innerHTML = '';
  SKINS.forEach(s => {
    const locked = !d.unlocked.includes(s.id);
    const el = document.createElement('div');
    el.className = 'sk' + (scol === s.id ? ' sel' : '') + (locked ? ' locked' : '');
    if (s.style === 'rainbow') el.classList.add('rainbow');
    else if (['fire','ice','gold','voidSkin','plasma'].includes(s.style)) el.style.background = skinColor(s.style, 0);
    else el.style.background = s.style;
    el.title = s.desc + (locked ? ` — ${s.unlock} pts requis` : '');
    if (s.label) el.textContent = s.label;
    if (!locked) el.addEventListener('click', () => {
      g.querySelectorAll('.sk').forEach(x => x.classList.remove('sel'));
      el.classList.add('sel'); scol = s.id;
    });
    g.appendChild(el);
  });
  document.getElementById('lobby-best').textContent = d.best ? 'Meilleur score : ' + d.best : '';
  const next = SKINS.find(s => s.unlock > 0 && !d.unlocked.includes(s.id));
  document.getElementById('skin-hint').textContent = next ? '(prochain : ' + next.desc + ')' : '(tous débloqués !)';
}

// ── BG PICKER ────────────────────────────────────────────────
document.getElementById('bgpicker').querySelectorAll('.bgp').forEach(o => {
  o.addEventListener('click', () => {
    document.getElementById('bgpicker').querySelectorAll('.bgp').forEach(x => x.classList.remove('sel'));
    o.classList.add('sel'); bgchoice = o.dataset.bg;
  });
});

// ── MOBILE ───────────────────────────────────────────────────
function chkMob() {
  isMob = ('ontouchstart' in window) || window.matchMedia('(hover:none)').matches;
  joyZone.style.display = isMob ? 'block' : 'none';
  boostMob.style.display = isMob ? 'flex' : 'none';
}
chkMob();
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; chkMob(); });

function vis(x, y, m = 90) { return x > cam.x - m && x < cam.x + canvas.width + m && y > cam.y - m && y < cam.y + canvas.height + m; }
function rw() { return 120 + Math.random() * (WW - 240); }
function rh() { return 120 + Math.random() * (WH - 240); }

// ══════════════════════════════════════════════
//  FONDS OFFSCREEN
// ══════════════════════════════════════════════
const bgC = document.createElement('canvas'); bgC.width = WW; bgC.height = WH;
const bgX = bgC.getContext('2d');
function buildBg(t) {
  bgX.clearRect(0, 0, WW, WH);
  if (t === 'tri') {
    const S = 58, h = S * Math.sqrt(3) / 2, rows = Math.ceil(WH / h) + 2, cols = Math.ceil(WW / S) + 2;
    const dk = ['#111','#141414','#0d0d0d','#161616','#0f0f0f','#131313'];
    bgX.fillStyle = '#0a0a0a'; bgX.fillRect(0, 0, WW, WH);
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      const ox = c * S - (r % 2 ? S / 2 : 0), oy = r * h;
      bgX.beginPath(); bgX.moveTo(ox + S / 2, oy); bgX.lineTo(ox + S, oy + h); bgX.lineTo(ox, oy + h); bgX.closePath();
      bgX.fillStyle = dk[(r * 7 + c * 3) % dk.length]; bgX.fill();
      bgX.strokeStyle = '#1d1d1d'; bgX.lineWidth = .5; bgX.stroke();
      bgX.beginPath(); bgX.moveTo(ox, oy + h); bgX.lineTo(ox + S, oy + h); bgX.lineTo(ox + S / 2, oy + 2 * h); bgX.closePath();
      bgX.fillStyle = dk[(r * 5 + c * 11) % dk.length]; bgX.fill();
      bgX.strokeStyle = '#181818'; bgX.lineWidth = .5; bgX.stroke();
    }
  } else if (t === 'hex') {
    bgX.fillStyle = '#03080a'; bgX.fillRect(0, 0, WW, WH);
    const S = 38, W = S * 2, H = Math.sqrt(3) * S;
    for (let row = 0; row < Math.ceil(WH / H) + 1; row++) {
      for (let col = 0; col < Math.ceil(WW / (W * 1.5)) + 1; col++) {
        const cx = col * W * 1.5 + (row % 2 ? W * .75 : 0), cy = row * H;
        bgX.beginPath();
        for (let i = 0; i < 6; i++) bgX.lineTo(cx + S * Math.cos(Math.PI / 6 + i * Math.PI / 3), cy + S * Math.sin(Math.PI / 6 + i * Math.PI / 3));
        bgX.closePath();
        bgX.fillStyle = (col + row) % 3 === 0 ? '#061008' : '#040b05'; bgX.fill();
        bgX.strokeStyle = '#0c1e0c'; bgX.lineWidth = .8; bgX.stroke();
      }
    }
  } else if (t === 'dots') {
    bgX.fillStyle = '#020204'; bgX.fillRect(0, 0, WW, WH);
    for (let x = 0; x < WW; x += 30) for (let y = 0; y < WH; y += 30) {
      bgX.beginPath(); bgX.arc(x, y, 1, 0, Math.PI * 2);
      bgX.fillStyle = `rgba(30,80,180,${.08 + Math.random() * .12})`; bgX.fill();
    }
    for (let i = 0; i < 400; i++) {
      bgX.beginPath(); bgX.arc(Math.random() * WW, Math.random() * WH, Math.random() * .9, 0, Math.PI * 2);
      bgX.fillStyle = `rgba(100,200,255,${.05 + Math.random() * .1})`; bgX.fill();
    }
  } else if (t === 'lava') {
    const g = bgX.createRadialGradient(WW * .5, WH * .5, 0, WW * .5, WH * .5, WW * .7);
    g.addColorStop(0, '#1a0500'); g.addColorStop(.6, '#0d0200'); g.addColorStop(1, '#080100');
    bgX.fillStyle = g; bgX.fillRect(0, 0, WW, WH);
    bgX.strokeStyle = 'rgba(200,60,0,.18)'; bgX.lineWidth = 1.5;
    for (let i = 0; i < 200; i++) {
      let cx = Math.random() * WW, cy = Math.random() * WH;
      bgX.beginPath(); bgX.moveTo(cx, cy);
      for (let s = 0; s < 5; s++) { cx += (Math.random() - .5) * 100; cy += (Math.random() - .5) * 100; bgX.lineTo(cx, cy); }
      bgX.stroke();
    }
    for (let i = 0; i < 350; i++) { bgX.beginPath(); bgX.arc(Math.random() * WW, Math.random() * WH, .9, 0, Math.PI * 2); bgX.fillStyle = `rgba(255,${40 + Math.random() * 100},0,${.07 + Math.random() * .14})`; bgX.fill(); }
  } else if (t === 'space') {
    bgX.fillStyle = '#00000e'; bgX.fillRect(0, 0, WW, WH);
    for (let i = 0; i < 10; i++) {
      const nx = Math.random() * WW, ny = Math.random() * WH, nr = 150 + Math.random() * 500;
      const ng = bgX.createRadialGradient(nx, ny, 0, nx, ny, nr);
      const h = Math.random() * 360;
      ng.addColorStop(0, `hsla(${h},80%,35%,.06)`); ng.addColorStop(1, 'rgba(0,0,0,0)');
      bgX.beginPath(); bgX.arc(nx, ny, nr, 0, Math.PI * 2); bgX.fillStyle = ng; bgX.fill();
    }
    for (let i = 0; i < 800; i++) { bgX.beginPath(); bgX.arc(Math.random() * WW, Math.random() * WH, Math.random() * 1.5, 0, Math.PI * 2); bgX.fillStyle = `rgba(255,255,255,${.03 + Math.random() * .22})`; bgX.fill(); }
  } else if (t === 'neon') {
    const g = bgX.createLinearGradient(0, 0, WW, WH);
    g.addColorStop(0, '#000c18'); g.addColorStop(.5, '#000a14'); g.addColorStop(1, '#000810');
    bgX.fillStyle = g; bgX.fillRect(0, 0, WW, WH);
    bgX.strokeStyle = 'rgba(0,180,255,.06)'; bgX.lineWidth = 1;
    for (let x = 0; x < WW; x += 60) { bgX.beginPath(); bgX.moveTo(x, 0); bgX.lineTo(x, WH); bgX.stroke(); }
    for (let y = 0; y < WH; y += 60) { bgX.beginPath(); bgX.moveTo(0, y); bgX.lineTo(WW, y); bgX.stroke(); }
    bgX.strokeStyle = 'rgba(255,0,220,.04)';
    for (let i = -WH; i < WW; i += 120) { bgX.beginPath(); bgX.moveTo(i, 0); bgX.lineTo(i + WH, WH); bgX.stroke(); }
    for (let i = 0; i < 250; i++) { bgX.beginPath(); bgX.arc(Math.random() * WW, Math.random() * WH, Math.random() * .8, 0, Math.PI * 2); bgX.fillStyle = `rgba(0,200,255,${.05 + Math.random() * .1})`; bgX.fill(); }
  }
}

const COLS = ['#00ffff','#ff00aa','#00ff88','#ffaa00','#ff4488','#44ffff','#aaff00','#ff8844','#88aaff','#ff44ff','#44ff88','#ffff44','#ff6666','#66ffaa','#ffcc44'];
function mkOrb(x, y) {
  if (x !== undefined) return { x, y, radius: 4 + Math.random() * 4, bt: null, shape: 'circle', col: COLS[Math.floor(Math.random() * COLS.length)], alpha: 1 };
  const r = Math.random(), c = COLS[Math.floor(Math.random() * COLS.length)];
  if (r < .06) return { x: rw(), y: rh(), radius: 15, bt: 'speed',  shape: 'star',   col: '#ff00ff', alpha: .9 };
  if (r < .10) return { x: rw(), y: rh(), radius: 18, bt: 'grow',   shape: 'meteor', col: '#ff8800', alpha: 1  };
  return { x: rw(), y: rh(), radius: 5 + Math.random() * 5, bt: null, shape: 'circle', col: c, alpha: 1 };
}

// ══════════════════════════════════════════════
//  ZONES DE CROISSANCE
// ══════════════════════════════════════════════
function mkGZ() { return { x: rw(), y: rh(), radius: 130 + Math.random() * 90, phase: Math.random() * Math.PI * 2 }; }
function drawGrowthZones() {
  growthZones.forEach(z => {
    if (!vis(z.x, z.y, z.radius + 20)) return;
    const sx = z.x - cam.x, sy = z.y - cam.y, t = fc * .018 + z.phase, p = 1 + Math.sin(t) * .04;
    const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, z.radius * p);
    g.addColorStop(0, 'rgba(0,255,100,.08)'); g.addColorStop(.7, 'rgba(0,180,70,.04)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(sx, sy, z.radius * p, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
    ctx.beginPath(); ctx.arc(sx, sy, z.radius * p, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0,255,100,${.15 + Math.sin(t) * .08})`; ctx.lineWidth = 1.5;
    ctx.setLineDash([8, 8]); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = `rgba(0,255,100,${.45 + Math.sin(t) * .15})`;
    ctx.font = '12px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(`🌿 ×${GZ_MULT} CROISSANCE`, sx, sy + z.radius * p + 15); ctx.textAlign = 'left';
  });
}

// ══════════════════════════════════════════════
//  OBSTACLES
// ══════════════════════════════════════════════
function mkObs() {
  const type = Math.random() < .45 ? 'bh' : 'cr';
  const a = Math.random() * Math.PI * 2, sp = .28 + Math.random() * .45;
  if (type === 'bh') { const r = 35 + Math.random() * 28; return { type: 'bh', x: rw(), y: rh(), radius: r, pullR: r * 3.4, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, phase: Math.random() * Math.PI * 2, ring: 0, tpcd: 0 }; }
  const r = 44 + Math.random() * 38;
  return { type: 'cr', x: rw(), y: rh(), radius: r, slowR: r * 2.1, vx: Math.cos(a) * sp * .55, vy: Math.sin(a) * sp * .55, phase: Math.random() * Math.PI * 2, subs: Array.from({ length: 3 + Math.floor(Math.random() * 4) }, () => ({ dx: (Math.random() - .5) * r * 1.3, dy: (Math.random() - .5) * r * 1.3, r: 4 + Math.random() * 9 })) };
}
function updObsts() {
  obsts.forEach(o => {
    o.x += o.vx; o.y += o.vy;
    if (o.x - o.radius < 0) { o.x = o.radius; o.vx *= -1; } if (o.x + o.radius > WW) { o.x = WW - o.radius; o.vx *= -1; }
    if (o.y - o.radius < 0) { o.y = o.radius; o.vy *= -1; } if (o.y + o.radius > WH) { o.y = WH - o.radius; o.vy *= -1; }
    if (o.type === 'bh') { o.ring += .028; if (o.tpcd > 0) o.tpcd--; }
  });
}

// ══════════════════════════════════════════════
//  BOTS IA V2 — Comportement joueur réaliste
//  Pas d'anti-spin bloquant.
//  Direction : interpolation douce vers la cible.
//  Priorités : 1)Fuir murs 2)Fuir obstacles 3)Chasser/manger
// ══════════════════════════════════════════════
const BNAMES = ['Nyx','Vortex','Glitch','Cipher','Flux','Nova','Zeta','Orion','Echo','Blaze','Rift','Phantom','Surge','Void','Kira'];
function mkBot(i) {
  const a = Math.random() * Math.PI * 2, d = 300 + Math.random() * 2000;
  const x = Math.max(200, Math.min(WW - 200, WW / 2 + Math.cos(a) * d));
  const y = Math.max(200, Math.min(WH - 200, WH / 2 + Math.sin(a) * d));
  const da = Math.random() * Math.PI * 2;
  return {
    name: BNAMES[i % BNAMES.length],
    segs: [{ x, y }],
    dir: { dx: Math.cos(da), dy: Math.sin(da) },
    score: 0,
    col: `hsl(${(i * 37 + 60) % 360},90%,58%)`,
    spd: BASE_SPD * (.85 + Math.random() * .35),
    alive: true,
    agg: 0.25 + Math.random() * 0.75,
    respawnTimer: 0,
    // wander
    wAngle: da,
    wChangeTick: 0,
    wChangeInterval: 30 + Math.floor(Math.random() * 80),
    pendingGrow: 0,
  };
}

function updBot(bot) {
  if (!bot.alive) return;
  const h = bot.segs[0];
  const R = snakeR(bot.segs.length);
  const pR = snakeR(snake.length);

  // ═══════════════════════════════════════════════
  //  PHASE 1 — CALCUL DES RÉPULSIONS (dangers)
  //  Chaque danger pousse le bot dans la direction
  //  opposée, avec une force proportionnelle à la
  //  proximité. On accumule tout avant de décider.
  // ═══════════════════════════════════════════════
  let repX = 0, repY = 0;

  // ── 1a. Murs ──
  const MW = 320;
  if (h.x < MW)      repX += ((MW - h.x) / MW) * 4;
  if (h.x > WW - MW) repX -= ((h.x - (WW - MW)) / MW) * 4;
  if (h.y < MW)      repY += ((MW - h.y) / MW) * 4;
  if (h.y > WH - MW) repY -= ((h.y - (WH - MW)) / MW) * 4;

  // ── 1b. Obstacles ──
  for (const o of obsts) {
    const d = Math.hypot(o.x - h.x, o.y - h.y);
    const zone = o.type === 'bh' ? o.pullR * 1.15 : o.radius + R + 120;
    if (d < zone && d > 0) {
      const strength = 3.5 * Math.pow(1 - d / zone, 1.5);
      repX += (h.x - o.x) / d * strength;
      repY += (h.y - o.y) / d * strength;
    }
  }

  // ── 1c. Corps du joueur — TOUJOURS dangereux ──
  //  On regarde les segments dans un rayon de détection.
  //  La tête du joueur est le danger MAXIMUM (mort garantie).
  const PLAYER_DETECT = 220 + R * 6;
  for (let i = 0; i < snake.length; i++) {
    const d = Math.hypot(snake[i].x - h.x, snake[i].y - h.y);
    if (d > PLAYER_DETECT) continue;
    if (d < 0.1) continue;
    // La tête (i=0) est mortelle sauf si on est plus grand ET on la percute volontairement
    // → on la fuit toujours (le bot n'a aucun moyen de savoir qu'il va tuer le joueur à coup sûr)
    // Le corps (i>0) est aussi mortel → répulsion forte
    const isHead = i === 0;
    const baseDanger = isHead ? 5.0 : 3.0;
    const strength = baseDanger * Math.pow(1 - d / PLAYER_DETECT, 1.8);
    repX += (h.x - snake[i].x) / d * strength;
    repY += (h.y - snake[i].y) / d * strength;
  }

  // ── 1d. Corps des autres bots ──
  //  Éviter les corps ennemis SAUF si on est significativement plus grand
  //  et qu'on veut les chasser (géré en phase 2).
  const BOT_DETECT = 160 + R * 5;
  for (const other of bots) {
    if (other === bot || !other.alive) continue;
    const oR = snakeR(other.segs.length);
    // On évite la tête adverse si on est plus petit
    const otherIsLarger = other.segs.length > bot.segs.length * 1.1;
    const checkCount = Math.min(other.segs.length, 30);
    for (let i = 0; i < checkCount; i++) {
      const d = Math.hypot(other.segs[i].x - h.x, other.segs[i].y - h.y);
      if (d > BOT_DETECT || d < 0.1) continue;
      // Tête : dangereux si l'autre est plus grand
      if (i === 0 && !otherIsLarger) continue; // tête adverse ignorée si on est plus grand
      const strength = (otherIsLarger ? 3.0 : 2.0) * Math.pow(1 - d / BOT_DETECT, 1.5);
      repX += (h.x - other.segs[i].x) / d * strength;
      repY += (h.y - other.segs[i].y) / d * strength;
    }
  }

  // ── Magnitude totale de la répulsion ──
  const repMag = Math.hypot(repX, repY);
  const hasDanger = repMag > 0.3; // seuil : au-dessus → mode fuite

  // ═══════════════════════════════════════════════
  //  PHASE 2 — CIBLE (seulement si pas de danger critique)
  // ═══════════════════════════════════════════════
  let tx = null, ty = null;

  // On ne chasse que si la répulsion est faible (bot en sécurité)
  if (repMag < 1.5) {
    // Chasser le CORPS du joueur (pas sa tête) si assez agressif et suffisamment grand
    const canHuntPlayer = bot.agg > 0.55 && bot.segs.length > snake.length * 0.6;
    if (canHuntPlayer && snake.length > 8) {
      // Viser le milieu du corps (loin de la tête)
      const ti = Math.max(6, Math.min(Math.floor(snake.length * 0.35), 25));
      if (snake.length > ti) {
        const d = Math.hypot(snake[ti].x - h.x, snake[ti].y - h.y);
        // Ne chasser que si la tête du joueur n'est pas dans la trajectoire
        const headDist = Math.hypot(snake[0].x - h.x, snake[0].y - h.y);
        if (d < 700 + bot.agg * 1000 && headDist > 180) {
          tx = snake[ti].x; ty = snake[ti].y;
        }
      }
    }

    // Chasser corps d'autres bots plus petits
    if (tx === null) {
      let bestD = Infinity;
      for (const other of bots) {
        if (other === bot || !other.alive || other.segs.length < 5) continue;
        if (other.segs.length > bot.segs.length * 0.85) continue; // ne chasse que les plus petits
        const ti = Math.max(4, Math.min(Math.floor(other.segs.length * 0.25), 12));
        if (other.segs.length <= ti) continue;
        const bs = other.segs[ti];
        const d = Math.hypot(bs.x - h.x, bs.y - h.y);
        if (d < bestD && d < 500 + bot.agg * 800) { bestD = d; tx = bs.x; ty = bs.y; }
      }
    }

    // Orbe le plus proche (comportement par défaut)
    if (tx === null) {
      let bd = 1400;
      for (const o of orbs) {
        const d = Math.hypot(o.x - h.x, o.y - h.y);
        if (d < bd) { bd = d; tx = o.x; ty = o.y; }
      }
    }
  }

  // ═══════════════════════════════════════════════
  //  PHASE 3 — FUSION répulsion + cible → direction
  // ═══════════════════════════════════════════════
  let dx = bot.dir.dx, dy = bot.dir.dy;

  if (hasDanger) {
    // Fuite : normaliser et mélanger avec inertie
    if (repMag > 0) { repX /= repMag; repY /= repMag; }
    // Plus le danger est fort, moins on garde l'inertie
    const fleeW = Math.min(repMag / 4, 0.9);
    dx = dx * (1 - fleeW) + repX * fleeW;
    dy = dy * (1 - fleeW) + repY * fleeW;
  } else if (tx !== null) {
    // Virage doux vers la cible
    const d = Math.hypot(tx - h.x, ty - h.y);
    if (d > 0) {
      const w = Math.min(0.08 + bot.agg * 0.12, 0.28);
      dx = dx * (1 - w) + ((tx - h.x) / d) * w;
      dy = dy * (1 - w) + ((ty - h.y) / d) * w;
    }
  } else {
    // Wander organique
    bot.wChangeTick++;
    if (bot.wChangeTick >= bot.wChangeInterval) {
      bot.wAngle += (Math.random() - 0.5) * 1.1;
      bot.wChangeInterval = 35 + Math.floor(Math.random() * 90);
      bot.wChangeTick = 0;
    }
    dx = dx * 0.97 + Math.cos(bot.wAngle) * 0.03;
    dy = dy * 0.97 + Math.sin(bot.wAngle) * 0.03;
  }

  // Normaliser
  const nl = Math.hypot(dx, dy);
  if (nl > 0) { bot.dir.dx = dx / nl; bot.dir.dy = dy / nl; }

  const nh = {
    x: Math.max(10, Math.min(WW - 10, h.x + bot.dir.dx * bot.spd)),
    y: Math.max(10, Math.min(WH - 10, h.y + bot.dir.dy * bot.spd))
  };

  // ── COLLISIONS ──
  for (const o of obsts) {
    if (Math.hypot(o.x - nh.x, o.y - nh.y) < o.radius + R) { killBot(bot); return; }
  }
  // Corps du joueur
  for (let i = 0; i < snake.length; i++) {
    const d = Math.hypot(snake[i].x - nh.x, snake[i].y - nh.y);
    if (d < snakeR(snake.length) + R) {
      if (i === 0) {
        if (bot.segs.length <= snake.length) { killBot(bot); return; }
        else { endGame('Collision frontale avec ' + bot.name + ' !'); return; }
      }
      killBot(bot); return;
    }
  }
  // Corps d'autres bots
  for (const other of bots) {
    if (other === bot || !other.alive) continue;
    const oR = snakeR(other.segs.length);
    for (let i = 0; i < Math.min(other.segs.length, 40); i++) {
      if (Math.hypot(other.segs[i].x - nh.x, other.segs[i].y - nh.y) < oR + R) {
        if (i === 0) {
          if (bot.segs.length < other.segs.length) { killBot(bot); return; }
          else if (bot.segs.length > other.segs.length) { killBot(other); }
          else { killBot(bot); killBot(other); return; }
        } else { killBot(bot); return; }
        break;
      }
    }
  }

  // Manger orbes — GRANDIR (pendingGrow)
  orbs = orbs.filter(o => {
    if (Math.hypot(o.x - nh.x, o.y - nh.y) < o.radius + R + 2) {
      bot.score++;
      bot.pendingGrow += o.bt ? GROW_PER_BONUS : GROW_PER_ORB;
      return false;
    }
    return true;
  });

  bot.segs.unshift(nh);

  // Ajouter de la longueur progressivement (pendingGrow)
  if (bot.pendingGrow > 0) {
    bot.pendingGrow--;
    // On garde la queue (pas de pop)
  } else {
    // Limiter longueur max naturelle
    if (bot.segs.length > MAX_SN) bot.segs.pop();
  }
}

function killBot(b) {
  if (!b.alive) return;
  b.alive = false;
  const n = Math.max(Math.floor(b.segs.length / 2), 4);
  for (let i = 0; i < n; i++) {
    const s = b.segs[Math.floor(i / n * b.segs.length)];
    orbs.push(mkOrb(s.x + (Math.random() - .5) * 16, s.y + (Math.random() - .5) * 16));
  }
  b.segs = [];
}

// ── TÊTE JOUEUR → BOT ────────────────────────────────────────
function chkPlayerOnBots(head) {
  if (inv > 0) return false;
  const pR = snakeR(snake.length);
  for (const b of bots) {
    if (!b.alive) continue;
    const bR = snakeR(b.segs.length);
    for (let i = 0; i < b.segs.length; i++) {
      if (Math.hypot(b.segs[i].x - head.x, b.segs[i].y - head.y) < pR + bR * .8) {
        if (i === 0) {
          if (snake.length > b.segs.length) { killBot(b); return false; }
          else { endGame('Collision frontale avec ' + b.name + ' !'); return true; }
        }
        endGame('Tu as foncé dans ' + b.name + ' !'); return true;
      }
    }
  }
  return false;
}

// ══════════════════════════════════════════════
//  CLASSEMENT LIVE
// ══════════════════════════════════════════════
function updateLB() {
  const e = [{ name: pname, len: snake.length, me: true }];
  bots.forEach(b => { if (b.alive) e.push({ name: b.name, len: b.segs.length, me: false }); });
  e.sort((a, b) => b.len - a.len);
  lbRows.innerHTML = e.slice(0, 8).map((x, i) => {
    const m = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`;
    return `<div class="lb-row ${x.me ? 'me' : 'other'}">${m} ${x.name}<span>${x.len}</span></div>`;
  }).join('');
}

// ══════════════════════════════════════════════
//  RENDU FOND + MUR
// ══════════════════════════════════════════════
function drawBg() {
  const sx = Math.max(0, cam.x - 200), sy = Math.max(0, cam.y - 200);
  const sw = Math.min(canvas.width + 400, WW - sx), sh = Math.min(canvas.height + 400, WH - sy);
  if (sw > 0 && sh > 0) ctx.drawImage(bgC, sx, sy, sw, sh, sx - cam.x, sy - cam.y, sw, sh);
}
function drawBarrier() {
  const bx = -cam.x, by = -cam.y, brd = 40;
  ctx.fillStyle = 'rgba(120,0,0,.18)';
  ctx.fillRect(bx - brd, by - brd, WW + brd * 2, brd);
  ctx.fillRect(bx - brd, by + WH, WW + brd * 2, brd);
  ctx.fillRect(bx - brd, by, brd, WH);
  ctx.fillRect(bx + WW, by, brd, WH);
  ctx.strokeStyle = 'rgba(160,0,0,.7)'; ctx.lineWidth = 14; ctx.setLineDash([22, 16]);
  ctx.strokeRect(bx, by, WW, WH); ctx.setLineDash([]);
}

// ── DESSIN TROU NOIR ─────────────────────────────────────────
function drawBH(o) {
  const sx = o.x - cam.x, sy = o.y - cam.y, t = fc * .02 + o.phase, r = o.radius;
  const hR = r * (1.6 + Math.sin(t) * .15);
  const hg = ctx.createRadialGradient(sx, sy, r * .5, sx, sy, hR);
  hg.addColorStop(0, 'rgba(120,0,255,.55)'); hg.addColorStop(.5, 'rgba(80,0,180,.25)'); hg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(sx, sy, hR, 0, Math.PI * 2); ctx.fillStyle = hg; ctx.fill();
  ctx.save(); ctx.translate(sx, sy); ctx.rotate(o.ring);
  ctx.beginPath(); ctx.ellipse(0, 0, r * 1.55, r * .38, 0, Math.PI, Math.PI * 2); ctx.strokeStyle = 'rgba(255,140,0,.35)'; ctx.lineWidth = 7; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fillStyle = '#000'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, 0, r * 1.55, r * .38, 0, 0, Math.PI); ctx.strokeStyle = 'rgba(255,200,60,.85)'; ctx.lineWidth = 7; ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.strokeStyle = `rgba(160,0,255,${.6 + Math.sin(t * 2) * .3})`; ctx.lineWidth = 4; ctx.stroke();
  ctx.restore();
  for (let p = 0; p < 6; p++) { const pa = o.ring * (1 + p * .3) + p * (Math.PI / 3), pr = r * (1.4 + Math.sin(t + p) * .2); ctx.beginPath(); ctx.arc(sx + Math.cos(pa) * pr, sy + Math.sin(pa) * pr * .35, 2.5, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,180,60,${.4 + Math.sin(t + p * 1.5) * .3})`; ctx.fill(); }
}

// ── DESSIN CRATÈRE ───────────────────────────────────────────
function drawCR(o) {
  const sx = o.x - cam.x, sy = o.y - cam.y, t = fc * .015 + o.phase, r = o.radius;
  const sR = o.slowR * (1 + Math.sin(t) * .04);
  const sg = ctx.createRadialGradient(sx, sy, r, sx, sy, sR);
  sg.addColorStop(0, 'rgba(80,140,200,.18)'); sg.addColorStop(.7, 'rgba(60,100,160,.08)'); sg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(sx, sy, sR, 0, Math.PI * 2); ctx.fillStyle = sg; ctx.fill();
  const bg2 = ctx.createRadialGradient(sx - r * .3, sy - r * .3, r * .1, sx, sy, r);
  bg2.addColorStop(0, '#4a5060'); bg2.addColorStop(.6, '#2a2e38'); bg2.addColorStop(1, '#141620');
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fillStyle = bg2; ctx.fill();
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.strokeStyle = `rgba(140,160,200,${.5 + Math.sin(t) * .15})`; ctx.lineWidth = 3; ctx.stroke();
  const iR = r * .42, ig = ctx.createRadialGradient(sx, sy, 0, sx, sy, iR);
  ig.addColorStop(0, '#080a10'); ig.addColorStop(.7, '#111420'); ig.addColorStop(1, '#2a2e38');
  ctx.beginPath(); ctx.arc(sx, sy, iR, 0, Math.PI * 2); ctx.fillStyle = ig; ctx.fill();
  o.subs.forEach(sc => { if (Math.hypot(sc.dx, sc.dy) + sc.r > r * .9) return; ctx.beginPath(); ctx.arc(sx + sc.dx, sy + sc.dy, sc.r, 0, Math.PI * 2); ctx.fillStyle = '#0d0f16'; ctx.fill(); });
  ctx.fillStyle = `rgba(120,180,255,${.3 + Math.sin(t * 2) * .15})`; ctx.font = '11px Courier New'; ctx.textAlign = 'center'; ctx.fillText('ZONE LENTE', sx, sy + r + 14); ctx.textAlign = 'left';
}

// ── DESSIN SERPENT JOUEUR ────────────────────────────────────
function drawSnakePlayer() {
  const R = snakeR(snake.length);
  const skinStyle = SKINS.find(s => s.id === scol)?.style || 'rainbow';
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 8;
  snake.forEach((seg, i) => {
    if (!vis(seg.x, seg.y, R + 4)) return;
    ctx.beginPath(); ctx.arc(seg.x - cam.x, seg.y - cam.y, R, 0, Math.PI * 2);
    ctx.fillStyle = skinColor(skinStyle, i);
    ctx.globalAlpha = 1; ctx.fill();
  });
  ctx.shadowBlur = 0;
  const hs = snake[0], hx = hs.x - cam.x, hy = hs.y - cam.y;
  const ang = Math.atan2(ldir.dy, ldir.dx);
  const eox = R * .8, eoy = -R * .7, er = R * .65, po = R * .22;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(hx - eox, hy + eoy, er, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx + eox, hy + eoy, er, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(hx - eox + Math.cos(ang) * po, hy + eoy + Math.sin(ang) * po, er * .42, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx + eox + Math.cos(ang) * po, hy + eoy + Math.sin(ang) * po, er * .42, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(hx - R * .35, hy + R * .8); ctx.lineTo(hx + R * .35, hy + R * .8); ctx.stroke();
  ctx.font = `bold ${Math.max(11, R * .8)}px Courier New`; ctx.textAlign = 'center';
  const nw = ctx.measureText(pname).width;
  ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fillRect(hx - nw / 2 - 4, hy - R - 22, nw + 8, 16);
  ctx.fillStyle = '#00ffff'; ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 5;
  ctx.fillText(pname, hx, hy - R - 9); ctx.shadowBlur = 0; ctx.textAlign = 'left';
  if (bA) { ctx.strokeStyle = 'rgba(255,0,255,.4)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(hx, hy, R + 4 + Math.sin(fc * .25) * 2, 0, Math.PI * 2); ctx.stroke(); }
  if (inGZ) { ctx.strokeStyle = `rgba(0,255,100,${.35 + Math.sin(fc * .1) * .15})`; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(hx, hy, R + 7, 0, Math.PI * 2); ctx.stroke(); }
}

function drawBot(bot) {
  if (!bot.segs.length) return;
  const R = snakeR(bot.segs.length);
  ctx.shadowBlur = 4;
  bot.segs.forEach((seg, i) => {
    if (!vis(seg.x, seg.y, R + 4)) return;
    ctx.beginPath(); ctx.arc(seg.x - cam.x, seg.y - cam.y, R, 0, Math.PI * 2);
    ctx.fillStyle = bot.col; ctx.shadowColor = bot.col;
    ctx.globalAlpha = 1 - i / bot.segs.length * .4; ctx.fill(); ctx.globalAlpha = 1;
  });
  ctx.shadowBlur = 0;
  const hs = bot.segs[0], hx = hs.x - cam.x, hy = hs.y - cam.y;
  const ang = bot.segs.length > 1 ? Math.atan2(hs.y - bot.segs[1].y, hs.x - bot.segs[1].x) : 0;
  const eox = R * .8, eoy = -R * .7, er = R * .65, po = R * .22;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(hx - eox, hy + eoy, er, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx + eox, hy + eoy, er, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(hx - eox + Math.cos(ang) * po, hy + eoy + Math.sin(ang) * po, er * .42, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx + eox + Math.cos(ang) * po, hy + eoy + Math.sin(ang) * po, er * .42, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(hx - R * .35, hy + R * .8); ctx.lineTo(hx + R * .35, hy + R * .8); ctx.stroke();
  ctx.font = `bold ${Math.max(10, R * .75)}px Courier New`; ctx.textAlign = 'center';
  const nw = ctx.measureText(bot.name).width;
  ctx.fillStyle = 'rgba(0,0,0,.5)'; ctx.fillRect(hx - nw / 2 - 4, hy - R - 21, nw + 8, 15);
  ctx.fillStyle = '#ddd'; ctx.fillText(bot.name, hx, hy - R - 9); ctx.textAlign = 'left';
}

// ── DESSIN ORBES ─────────────────────────────────────────────
function drawOrb(o) {
  const sx = o.x - cam.x, sy = o.y - cam.y;
  if (o.shape === 'star') {
    drawStar(sx, sy, 8, o.radius, o.radius / 2, o.col, o.alpha);
  } else if (o.shape === 'meteor') {
    ctx.beginPath(); ctx.arc(sx, sy, o.radius, 0, Math.PI * 2); ctx.fillStyle = 'orange'; ctx.shadowColor = 'orangered'; ctx.shadowBlur = 14; ctx.fill(); ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.strokeStyle = 'orangered'; ctx.lineWidth = 5; ctx.shadowColor = 'orangered'; ctx.shadowBlur = 8;
    ctx.moveTo(sx - o.radius * 1.4, sy + o.radius * .2); ctx.lineTo(sx - o.radius * 2.8, sy + o.radius * 1.4); ctx.stroke(); ctx.shadowBlur = 0;
  } else {
    ctx.beginPath(); ctx.arc(sx, sy, o.radius * (1 + Math.sin(fc * .04 + o.x * .01) * .07), 0, Math.PI * 2);
    ctx.fillStyle = o.col; ctx.shadowColor = o.col; ctx.shadowBlur = 7; ctx.fill(); ctx.shadowBlur = 0;
  }
}
function drawStar(x, y, sp, oR, iR, col, alpha) {
  let rot = Math.PI / 2 * 3; const step = Math.PI / sp;
  ctx.beginPath(); ctx.moveTo(x, y - oR);
  for (let i = 0; i < sp; i++) { ctx.lineTo(x + Math.cos(rot) * oR, y + Math.sin(rot) * oR); rot += step; ctx.lineTo(x + Math.cos(rot) * iR, y + Math.sin(rot) * iR); rot += step; }
  ctx.closePath(); ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 18; ctx.globalAlpha = alpha; ctx.fill(); ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

// ── MINIMAP ──────────────────────────────────────────────────
function drawMM() {
  mmCtx.clearRect(0, 0, 130, 130); mmCtx.fillStyle = 'rgba(0,0,0,.8)'; mmCtx.fillRect(0, 0, 130, 130);
  const sx = 130 / WW, sy = 130 / WH;
  growthZones.forEach(z => { mmCtx.beginPath(); mmCtx.arc(z.x * sx, z.y * sy, z.radius * sx, 0, Math.PI * 2); mmCtx.fillStyle = 'rgba(0,255,100,.1)'; mmCtx.fill(); mmCtx.strokeStyle = 'rgba(0,255,100,.35)'; mmCtx.lineWidth = 1; mmCtx.stroke(); });
  orbs.forEach(o => { mmCtx.fillStyle = o.bt ? '#ff00ff' : o.col || '#00ffff'; mmCtx.beginPath(); mmCtx.arc(o.x * sx, o.y * sy, 1.5, 0, Math.PI * 2); mmCtx.fill(); });
  obsts.forEach(o => { mmCtx.fillStyle = o.type === 'bh' ? '#8800ff' : '#5588aa'; mmCtx.beginPath(); mmCtx.arc(o.x * sx, o.y * sy, o.type === 'bh' ? 5 : 4, 0, Math.PI * 2); mmCtx.fill(); });
  bots.forEach(b => { if (!b.alive || !b.segs.length) return; mmCtx.fillStyle = b.col; mmCtx.beginPath(); mmCtx.arc(b.segs[0].x * sx, b.segs[0].y * sy, 3, 0, Math.PI * 2); mmCtx.fill(); });
  if (snake && snake.length) { mmCtx.fillStyle = '#00ffff'; mmCtx.beginPath(); mmCtx.arc(snake[0].x * sx, snake[0].y * sy, 6, 0, Math.PI * 2); mmCtx.fill(); mmCtx.strokeStyle = 'rgba(0,255,255,.18)'; mmCtx.lineWidth = 1; mmCtx.strokeRect(cam.x * sx, cam.y * sy, canvas.width * sx, canvas.height * sy); }
}

// ── OBSTACLES JOUEUR ─────────────────────────────────────────
function handleObsts(head) {
  slA = false; if (inv > 0) { inv--; return false; }
  const pR = snakeR(snake.length);
  for (const o of obsts) {
    const d = Math.hypot(head.x - o.x, head.y - o.y);
    if (o.type === 'bh') {
      if (d < o.pullR && d > o.radius + pR) {
        const f = (1 - d / o.pullR) ** 2 * 2.6, nx = (o.x - head.x) / d, ny = (o.y - head.y) / d;
        ldir.dx = ldir.dx * (1 - f * .1) + nx * f * .1; ldir.dy = ldir.dy * (1 - f * .1) + ny * f * .1;
        const l = Math.hypot(ldir.dx, ldir.dy); if (l > 0) { ldir.dx /= l; ldir.dy /= l; }
      }
      if (d < o.radius + pR && o.tpcd <= 0) {
        let tx, ty, safe = false, att = 0;
        while (!safe && att < 25) { tx = 150 + Math.random() * (WW - 300); ty = 150 + Math.random() * (WH - 300); safe = obsts.every(ob => Math.hypot(ob.x - tx, ob.y - ty) > 280); att++; }
        const ddx = tx - snake[0].x, ddy = ty - snake[0].y;
        snake = snake.map(s => ({ x: s.x + ddx, y: s.y + ddy }));
        o.tpcd = 120; inv = IFRAMES; flashA = 1; return false;
      }
    } else {
      if (d < o.slowR) { slA = true; slT = 5; }
      if (d < o.radius + pR) { endGame('Cratère lunaire !'); return true; }
    }
  }
  return false;
}
function drawFlash() { if (flashA <= 0) return; ctx.fillStyle = `rgba(150,0,255,${flashA})`; ctx.fillRect(0, 0, canvas.width, canvas.height); flashA = Math.max(0, flashA - .05); }

// ══════════════════════════════════════════════
//  BOUCLE PRINCIPALE
// ══════════════════════════════════════════════
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  fc++;

  const head = { ...snake[0] };
  if (head.x < 0 || head.x > WW || head.y < 0 || head.y > WH) { endGame('Sorti de la carte !'); return; }

  // Direction joueur
  if (joyAct && (Math.abs(joyDelta.x) > 5 || Math.abs(joyDelta.y) > 5)) {
    const l = Math.hypot(joyDelta.x, joyDelta.y); ldir.dx = joyDelta.x / l; ldir.dy = joyDelta.y / l;
  } else if (!joyAct && mmoved) {
    const wx = cam.x + mouse.x, wy = cam.y + mouse.y, d = Math.hypot(wx - head.x, wy - head.y);
    if (d > 0) { ldir.dx = (wx - head.x) / d; ldir.dy = (wy - head.y) / d; } mmoved = false;
  }

  // ── BOOST : seul moment de perte de taille ──
  if (bA && snake.length > 5) {
    bSA += BOOST_SHRINK_RATE;
    if (bSA >= 1) {
      // Lâcher orbe depuis la queue
      const tail = snake[snake.length - 1];
      bOrbAcc += BOOST_ORB_RATE;
      if (bOrbAcc >= 1) {
        orbs.push(mkOrb(tail.x + (Math.random() - .5) * 10, tail.y + (Math.random() - .5) * 10));
        bOrbAcc -= 1;
      }
      snake.pop(); // ← SEUL endroit où on retire un segment au joueur
      bSA -= 1;
    }
    if (snake.length <= 4) bA = false;
  }

  // Vitesse
  let spd = BASE_SPD;
  if (bA) spd *= BOOST_SPD_MULT;
  if (bonA) spd *= 1.7;
  if (gfA) spd *= 1.25;
  if (slA) spd *= .45;

  head.x += ldir.dx * spd; head.y += ldir.dy * spd;
  snake.unshift(head);

  // ── CROISSANCE NATURELLE ──
  // On ajoute la tête sans pop si pendingGrow > 0
  if (pendingGrow > 0) {
    pendingGrow--;
    // Pas de pop → le serpent grandit
  } else {
    // Limiter à MAX_SN seulement
    if (snake.length > MAX_SN) snake.pop();
  }

  // Zone de croissance
  const prevInGZ = inGZ;
  inGZ = growthZones.some(z => Math.hypot(head.x - z.x, head.y - z.y) < z.radius);
  if (inGZ && !prevInGZ) {
    zoneMsgEl.style.display = 'block'; zoneMsgEl.style.opacity = '1';
    if (zoneMsgTimer) clearTimeout(zoneMsgTimer);
    zoneMsgTimer = setTimeout(() => { zoneMsgEl.style.opacity = '0'; setTimeout(() => zoneMsgEl.style.display = 'none', 400); }, 1800);
  }

  // Manger orbes → pendingGrow (pas de suppression de queue immédiate)
  const pR = snakeR(snake.length);
  orbs = orbs.filter(o => {
    if (Math.hypot(o.x - head.x, o.y - head.y) < o.radius + pR + 2) {
      if (o.bt === 'speed') { score += 2; bonA = true; bonT = 500; }
      else if (o.bt === 'grow') { score += 3; gfA = true; gfT = 500; pendingGrow += GROW_PER_BONUS * (inGZ ? GZ_MULT : 1); }
      else { score += 1; }
      // Croissance : ajouter segments en file
      const growAmt = Math.round((o.bt === 'grow' ? GROW_PER_BONUS : GROW_PER_ORB) * (inGZ ? GZ_MULT : 1));
      pendingGrow += growAmt;
      scoreEl.textContent = 'Score: ' + score;
      checkUnlocks();
      return false;
    }
    return true;
  });

  updObsts();
  if (handleObsts(head)) return;
  if (chkPlayerOnBots(head)) return;

  if (bonA) { if (--bonT <= 0) bonA = false; }
  if (gfA)  { if (--gfT <= 0) gfA = false; }
  if (slT > 0) { slT--; if (slT <= 0) slA = false; }

  while (orbs.length < ORB_COUNT) orbs.push(mkOrb());

  // ── Bots : update + réapparition ──
  bots.forEach((b, i) => {
    if (b.alive) {
      updBot(b);
    } else {
      b.respawnTimer = (b.respawnTimer || 0) + 1;
      if (b.respawnTimer > 200) {
        // Réapparition en dehors de la vue du joueur
        let nx, ny, att = 0;
        do {
          nx = 200 + Math.random() * (WW - 400);
          ny = 200 + Math.random() * (WH - 400);
          att++;
        } while (att < 20 && Math.hypot(nx - snake[0].x, ny - snake[0].y) < 600);
        const da = Math.random() * Math.PI * 2;
        bots[i] = {
          ...mkBot(i),
          name: BNAMES[i % BNAMES.length],
          col: b.col,
          segs: [{ x: nx, y: ny }],
          dir: { dx: Math.cos(da), dy: Math.sin(da) },
          alive: true,
          respawnTimer: 0,
          pendingGrow: 0,
        };
      }
    }
  });

  cam.x = head.x - canvas.width / 2; cam.y = head.y - canvas.height / 2;

  // ── RENDU ──
  drawBg();
  drawGrowthZones();
  drawBarrier();
  obsts.forEach(o => { if (!vis(o.x, o.y, (o.pullR || o.slowR || 100) + 50)) return; if (o.type === 'bh') drawBH(o); else drawCR(o); });
  orbs.forEach(o => { if (vis(o.x, o.y)) drawOrb(o); });
  bots.forEach(b => { if (b.alive && b.segs.length) drawBot(b); });
  drawSnakePlayer();
  drawFlash();

  let st = '';
  if (bA)   st += '⚡ BOOST  ';
  if (bonA) st += '⚡ VITESSE+  ';
  if (gfA)  st += '🌱 CROISSANCE+  ';
  if (slA)  st += '🌑 ZONE LENTE  ';
  if (inGZ) st += `🌿 ×${GZ_MULT} TAILLE  `;
  statusBar.textContent = st;

  drawMM();
  if (fc % 10 === 0) updateLB();
}

function stopLoop() { if (raf !== null) { cancelAnimationFrame(raf); raf = null; } }
function loop() { if (!running) return; draw(); raf = requestAnimationFrame(loop); }

function endGame(msg) {
  stopLoop(); running = false;
  killMsgEl.textContent = msg || '';
  document.getElementById('go-sc').textContent = score;
  goEl.style.display = 'flex';
  bInfoEl.style.display = 'none'; lbEl.style.display = 'none'; audioCtrl.style.display = 'none';
  saveData(score); dispHS(); buildSkinPicker();
}

function initGame() {
  score = 0; fc = 0; flashA = 0; bSA = 0; bOrbAcc = 0; inGZ = false; bA = false;
  pendingGrow = 0;
  // Serpent de départ avec longueur initiale
  snake = [];
  for (let i = 0; i < PLAYER_START_LEN; i++) snake.push({ x: WW / 2 - i * 14, y: WH / 2 });
  ldir = { dx: 1, dy: 0 };
  cam = { x: WW / 2 - canvas.width / 2, y: WH / 2 - canvas.height / 2 };
  mouse = { x: canvas.width / 2, y: canvas.height / 2 }; mmoved = false;
  orbs = []; for (let i = 0; i < ORB_COUNT; i++) orbs.push(mkOrb());
  obsts = []; for (let i = 0; i < OBS_COUNT; i++) obsts.push(mkObs());
  bots = []; for (let i = 0; i < BOT_COUNT; i++) bots.push(mkBot(i));
  growthZones = []; for (let i = 0; i < GZ_COUNT; i++) growthZones.push(mkGZ());
  bonA = false; bonT = 0; gfA = false; gfT = 0; slA = false; slT = 0; inv = 0;
  scoreEl.textContent = 'Score: 0';
  bInfoEl.style.display = 'flex';
  buildBg(bgchoice);
  prevUnlocked = [...getData().unlocked];
}

// ── SCORES ───────────────────────────────────────────────────
function saveScore(n, s) {
  let sc = JSON.parse(localStorage.getItem('nsScores') || '[]');
  sc.push({ name: n, score: s }); sc.sort((a, b) => b.score - a.score);
  if (sc.length > 5) sc = sc.slice(0, 5);
  localStorage.setItem('nsScores', JSON.stringify(sc));
}
function dispHS() {
  const sc = JSON.parse(localStorage.getItem('nsScores') || '[]');
  if (!sc.length) { goHsEl.innerHTML = '<b>Top Scores :</b><br>Pas encore de scores'; return; }
  let h = '<b>Top Scores :</b><br><ol>';
  sc.forEach(s => { h += `<li>${s.name}: ${s.score}</li>`; });
  goHsEl.innerHTML = h + '</ol>';
}

function showLobby() {
  goEl.style.display = 'none';
  scoreEl.style.display = statusBar.style.display = 'none';
  audioCtrl.style.display = 'none'; lbEl.style.display = 'none';
  buildSkinPicker(); lobbyEl.style.display = 'flex'; lobbyEl.style.opacity = '1';
}

// ══════════════════════════════════════════════
//  CONTRÔLES
// ══════════════════════════════════════════════
document.addEventListener('mousemove', e => { if (!isTouching) { mouse.x = e.clientX; mouse.y = e.clientY; mmoved = true; } });
canvas.addEventListener('mousedown', e => { if (e.button === 0) { e.preventDefault(); bA = true; } });
document.addEventListener('mouseup', e => { if (e.button === 0) bA = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => { if (['Space','ShiftLeft','ShiftRight'].includes(e.code)) { e.preventDefault(); bA = true; } });
document.addEventListener('keyup', e => { if (['Space','ShiftLeft','ShiftRight'].includes(e.code)) bA = false; });

// Joystick
joyZone.addEventListener('touchstart', e => { e.preventDefault(); joyAct = true; joyOrig.x = e.touches[0].clientX; joyOrig.y = e.touches[0].clientY; joyDelta = { x: 0, y: 0 }; }, { passive: false });
joyZone.addEventListener('touchmove', e => {
  e.preventDefault(); joyDelta.x = e.touches[0].clientX - joyOrig.x; joyDelta.y = e.touches[0].clientY - joyOrig.y;
  const max = 44, l = Math.hypot(joyDelta.x, joyDelta.y); if (l > max) { joyDelta.x = joyDelta.x / l * max; joyDelta.y = joyDelta.y / l * max; }
  joyThumb.style.transform = `translate(calc(-50% + ${joyDelta.x}px),calc(-50% + ${joyDelta.y}px))`;
}, { passive: false });
joyZone.addEventListener('touchend', () => { joyAct = false; joyDelta = { x: 0, y: 0 }; joyThumb.style.transform = 'translate(-50%,-50%)'; });

canvas.addEventListener('touchstart', e => { isTouching = true; if (e.target === joyZone || e.target === boostMob) return; mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mmoved = true; }, { passive: true });
canvas.addEventListener('touchmove', e => { if (e.target === joyZone || e.target === boostMob) return; mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mmoved = true; }, { passive: true });
canvas.addEventListener('touchend', () => { isTouching = false; });

boostMob.addEventListener('touchstart', e => { e.preventDefault(); bA = true; boostMob.classList.add('on'); }, { passive: false });
boostMob.addEventListener('touchend', () => { bA = false; boostMob.classList.remove('on'); });
let lpT = null;
canvas.addEventListener('touchstart', e => { if (e.target === joyZone || e.target === boostMob) return; lpT = setTimeout(() => { bA = true; }, 200); }, { passive: true });
canvas.addEventListener('touchend', () => { clearTimeout(lpT); if (!boostMob.classList.contains('on')) bA = false; });

// ── BOUTONS MENU ─────────────────────────────────────────────
document.getElementById('play-btn').addEventListener('click', () => {
  pname = document.getElementById('sname').value.trim() || 'Joueur';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  lobbyEl.style.opacity = '0';
  setTimeout(() => {
    lobbyEl.style.display = 'none';
    scoreEl.style.display = statusBar.style.display = 'block';
    audioCtrl.style.display = 'flex';
    lbEl.style.display = 'block';
    initGame(); running = true; loop();
  }, 800);
});
document.getElementById('sname').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('play-btn').click(); });

document.getElementById('replay-btn').addEventListener('click', () => {
  const n = pnEl.value.trim() || 'Anonyme'; saveScore(n, score); pnEl.value = '';
  goEl.style.display = 'none';
  scoreEl.style.display = statusBar.style.display = 'block';
  audioCtrl.style.display = 'flex'; lbEl.style.display = 'block';
  initGame(); running = true; loop();
});

document.getElementById('lobby-btn').addEventListener('click', () => {
  const n = pnEl.value.trim() || 'Anonyme'; saveScore(n, score); pnEl.value = ''; showLobby();
});

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; chkMob(); });
window.dispatchEvent(new Event('resize'));
buildSkinPicker();
</script>
</body>
</html>
