<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>NeonSnake</title>
<style>
  body {
    margin: 0;
    background: #000;
    color: #00ffff;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #start-screen {
    position: absolute; width: 100%; height: 100%;
    background: black;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 10;
    transition: opacity 1s ease;
  }
  #start-screen h1 {
    font-size: 4rem; color: #00ffff;
    text-shadow: 0 0 20px #00ffff;
    margin-bottom: 2rem;
  }
  #start-button {
    padding: 1rem 2rem; font-size: 1.5rem;
    color: #000; background: #00ffff;
    border: none; border-radius: 1rem;
    cursor: pointer; box-shadow: 0 0 10px #00ffff;
    transition: background 0.3s;
  }
  #start-button:hover { background: #00cccc; }
  #score {
    position: absolute; top: 10px; left: 10px;
    font-size: 1.5rem; z-index: 5; display: none;
  }
  #status-bar {
    position: absolute; top: 50px; left: 10px;
    font-size: 0.9rem; z-index: 5; display: none;
    color: #00ffff; line-height: 1.6;
  }
  #volume-control {
    position: absolute; top: 10px; right: 10px;
    z-index: 20; display: none;
  }
  #volume-control label { font-size: 1rem; margin-right: 5px; color: #00ffff; }
  #minimap {
    position: absolute; bottom: 10px; right: 10px;
    width: 150px; height: 150px;
    border: 2px solid #00ffff;
    background: rgba(0,0,0,0.7); z-index: 10;
  }
  canvas {
    display: block;
    border: 10px solid #00ffff;
    box-shadow: 0 0 40px #00ffff;
    will-change: transform;
  }
  #game-over-screen {
    display: none;
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 10;
    justify-content: center; align-items: center;
    flex-direction: column;
    color: #00ffff; font-family: 'Courier New', monospace;
  }
  #game-over-screen button {
    padding: 1rem 2rem; font-size: 1.5rem;
    background: #00ffff; color: #000;
    border: none; border-radius: 1rem;
    box-shadow: 0 0 15px #00ffff;
    cursor: pointer; margin-top: 20px;
  }
  #game-over-screen input {
    font-size: 1.2rem; padding: 0.5rem;
    border-radius: 0.5rem; border: none;
    margin-top: 1rem; text-align: center;
    width: 200px; box-shadow: 0 0 10px #00ffff;
  }
  #highscores {
    margin-top: 2rem; font-size: 1.2rem;
    max-width: 300px; text-align: left;
  }
</style>
</head>
<body>

<div id="start-screen">
  <h1>NeonSnake</h1>
  <button id="start-button">Jouer</button>
</div>

<div id="score">Score: 0</div>
<div id="status-bar"></div>

<div id="volume-control">
  <label for="volume">Volume:</label>
  <input id="volume" type="range" min="0" max="1" step="0.01" value="0.5" />
</div>

<canvas id="gameCanvas"></canvas>
<canvas id="minimap"></canvas>

<div id="game-over-screen">
  <h2>Game Over</h2>
  <label for="player-name">Votre pseudo :</label>
  <input id="player-name" type="text" placeholder="Anonyme" maxlength="12" />
  <button id="replay-button">Rejouer</button>
  <div id="highscores"><b>Top Scores :</b><br>Pas encore de scores</div>
</div>

<script>
  // ── Références DOM ──
  const canvas        = document.getElementById('gameCanvas');
  const ctx           = canvas.getContext('2d');
  const minimapEl     = document.getElementById('minimap');
  const minimapCtx    = minimapEl.getContext('2d');
  const volumeControl = document.getElementById('volume-control');
  const volumeSlider  = document.getElementById('volume');
  const scoreEl       = document.getElementById('score');
  const statusBar     = document.getElementById('status-bar');
  const gameOverEl    = document.getElementById('game-over-screen');
  const startScreenEl = document.getElementById('start-screen');
  const highscoresEl  = document.getElementById('highscores');
  const playerNameEl  = document.getElementById('player-name');

  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  minimapEl.width = minimapEl.height = 150;

  const worldWidth = 5000, worldHeight = 5000;

  let snake         = [{ x: worldWidth / 2, y: worldHeight / 2 }];
  let camera        = { x: 0, y: 0 };
  let score         = 0;
  let gameRunning   = false;
  let orbs          = [];
  let obstacles     = [];
  let lastDirection = { dx: 1, dy: 0 };
  let mouse         = { x: canvas.width / 2, y: canvas.height / 2 };
  let isTouching    = false;
  let mouseMoved    = false;
  let rafId         = null;
  let frameCount    = 0; // compteur global de frames pour les animations

  const baseSpeed       = 3.2;
  let speed             = baseSpeed;
  let bonusActive       = false, bonusTimer = 0;
  let growFastActive    = false, growFastTimer = 0;
  let slowActive        = false; // ralentissement par cratère
  let slowTimer         = 0;
  const MAX_SNAKE_LENGTH = 500;
  const orbCount        = 150;
  const obstacleCount   = 30; // réduit car les nouveaux obstacles sont plus grands

  const backgroundMusic = new Audio('assets/neon-gaming.mp3');
  backgroundMusic.loop = true; backgroundMusic.volume = 0.5;
  document.addEventListener('click',      () => backgroundMusic.play(), { once: true });
  document.addEventListener('touchstart', () => backgroundMusic.play(), { once: true });
  volumeSlider.addEventListener('input',  () => { backgroundMusic.volume = volumeSlider.value; });

  // ── Canvas offscreen minimap ──
  const minimapStatic    = document.createElement('canvas');
  minimapStatic.width = minimapStatic.height = 150;
  const minimapStaticCtx = minimapStatic.getContext('2d');

  // ── Frustum culling ──
  function isVisible(x, y, margin) {
    margin = margin || 80;
    return x > camera.x - margin && x < camera.x + canvas.width  + margin &&
           y > camera.y - margin && y < camera.y + canvas.height + margin;
  }

  // ── Orbes ──
  function createOrb() {
    const rand = Math.random();
    if (rand < 0.07) return { x: Math.random()*worldWidth, y: Math.random()*worldHeight, radius:15, bonusType:'speed',    shape:'star',   alpha: 0.85+Math.random()*0.15 };
    if (rand < 0.12) return { x: Math.random()*worldWidth, y: Math.random()*worldHeight, radius:18, bonusType:'growFast', shape:'meteor', alpha:1 };
    return                  { x: Math.random()*worldWidth, y: Math.random()*worldHeight, radius: 5+Math.random()*5, bonusType:null, shape:'circle', alpha:1 };
  }
  for (let i = 0; i < orbCount; i++) orbs.push(createOrb());

  // ══════════════════════════════════════════════════════
  // ── NOUVEAUX OBSTACLES ──
  // Types : 'blackhole' | 'crater'
  // Tous ont une position + vitesse de déplacement lent
  // ══════════════════════════════════════════════════════
  function createObstacle() {
    const type = Math.random() < 0.45 ? 'blackhole' : 'crater';

    // Vitesse de déplacement lente et aléatoire
    const angle = Math.random() * Math.PI * 2;
    const spd   = 0.3 + Math.random() * 0.5;

    if (type === 'blackhole') {
      const radius = 35 + Math.random() * 30; // rayon de base
      return {
        type,
        x:  Math.random() * worldWidth,
        y:  Math.random() * worldHeight,
        radius,
        // Zone d'attraction : 3× le rayon
        pullRadius: radius * 3.5,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        // Phase d'animation individuelle pour désynchroniser les trous noirs
        phase: Math.random() * Math.PI * 2,
        // Rotation de l'anneau d'accrétion
        ringAngle: 0,
      };
    } else {
      // Cratère lunaire : cercle avec impact + zone de ralentissement
      const radius = 45 + Math.random() * 40;
      return {
        type,
        x:  Math.random() * worldWidth,
        y:  Math.random() * worldHeight,
        radius,
        slowRadius: radius * 2.2, // zone de ralentissement autour du cratère
        vx: Math.cos(angle) * spd * 0.6, // cratères un peu plus lents
        vy: Math.sin(angle) * spd * 0.6,
        phase: Math.random() * Math.PI * 2,
        // Cratères secondaires aléatoires autour du principal
        subCraters: Array.from({ length: 3 + Math.floor(Math.random() * 4) }, () => ({
          dx: (Math.random() - 0.5) * radius * 1.4,
          dy: (Math.random() - 0.5) * radius * 1.4,
          r:  4 + Math.random() * 10,
        })),
      };
    }
  }
  for (let i = 0; i < obstacleCount; i++) obstacles.push(createObstacle());

  // ── Mise à jour des positions obstacles ──
  function updateObstacles() {
    obstacles.forEach(obs => {
      obs.x += obs.vx;
      obs.y += obs.vy;
      // Rebondir sur les bords du monde
      if (obs.x - obs.radius < 0)          { obs.x = obs.radius;             obs.vx *= -1; }
      if (obs.x + obs.radius > worldWidth)  { obs.x = worldWidth - obs.radius; obs.vx *= -1; }
      if (obs.y - obs.radius < 0)          { obs.y = obs.radius;              obs.vy *= -1; }
      if (obs.y + obs.radius > worldHeight) { obs.y = worldHeight - obs.radius; obs.vy *= -1; }
      // Rotation anneau d'accrétion
      if (obs.type === 'blackhole') obs.ringAngle += 0.03;
    });
  }

  // ══════════════════════════════════════════════════════
  // ── DESSIN TROU NOIR ──
  // Centre noir + anneau d'accrétion tournant + halo violet
  // ══════════════════════════════════════════════════════
  function drawBlackhole(obs) {
    const sx = obs.x - camera.x;
    const sy = obs.y - camera.y;
    const t  = frameCount * 0.02 + obs.phase;
    const r  = obs.radius;

    // Halo extérieur pulsant
    const haloR = r * (1.6 + Math.sin(t) * 0.15);
    const halo  = ctx.createRadialGradient(sx, sy, r * 0.5, sx, sy, haloR);
    halo.addColorStop(0,   'rgba(120, 0, 255, 0.55)');
    halo.addColorStop(0.5, 'rgba(80,  0, 180, 0.25)');
    halo.addColorStop(1,   'rgba(0,   0,   0, 0)');
    ctx.beginPath();
    ctx.arc(sx, sy, haloR, 0, Math.PI * 2);
    ctx.fillStyle = halo;
    ctx.fill();

    // Anneau d'accrétion : ellipse inclinée qui tourne
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(obs.ringAngle);
    // Anneau arrière (derrière le centre)
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 1.55, r * 0.38, 0, Math.PI, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255, 140, 0, 0.35)';
    ctx.lineWidth   = 7;
    ctx.stroke();
    // Corps central — trou noir absolu
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
    // Anneau avant (devant le centre)
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 1.55, r * 0.38, 0, 0, Math.PI);
    ctx.strokeStyle = 'rgba(255, 200, 60, 0.85)';
    ctx.lineWidth   = 7;
    ctx.stroke();
    // Lueur interne violette au bord de l'horizon
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(160, 0, 255, ${0.6 + Math.sin(t * 2) * 0.3})`;
    ctx.lineWidth   = 4;
    ctx.stroke();
    ctx.restore();

    // Particules aspirées (petits points orbitaux)
    for (let p = 0; p < 6; p++) {
      const pa    = obs.ringAngle * (1 + p * 0.3) + p * (Math.PI / 3);
      const pr    = r * (1.4 + Math.sin(t + p) * 0.2);
      const px    = sx + Math.cos(pa) * pr;
      const py    = sy + Math.sin(pa) * pr * 0.35;
      const alpha = 0.4 + Math.sin(t + p * 1.5) * 0.3;
      ctx.beginPath();
      ctx.arc(px, py, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 180, 60, ${alpha})`;
      ctx.fill();
    }
  }

  // ══════════════════════════════════════════════════════
  // ── DESSIN CRATÈRE LUNAIRE ──
  // Surface rocheuse grise + impact central + petits cratères + zone lente
  // ══════════════════════════════════════════════════════
  function drawCrater(obs) {
    const sx = obs.x - camera.x;
    const sy = obs.y - camera.y;
    const t  = frameCount * 0.015 + obs.phase;
    const r  = obs.radius;

    // Zone de ralentissement : halo bleu-gris transparent pulsant
    const slowR = obs.slowRadius * (1 + Math.sin(t) * 0.04);
    const slowHalo = ctx.createRadialGradient(sx, sy, r, sx, sy, slowR);
    slowHalo.addColorStop(0,   'rgba(80, 140, 200, 0.18)');
    slowHalo.addColorStop(0.7, 'rgba(60, 100, 160, 0.08)');
    slowHalo.addColorStop(1,   'rgba(0,   0,   0,  0)');
    ctx.beginPath();
    ctx.arc(sx, sy, slowR, 0, Math.PI * 2);
    ctx.fillStyle = slowHalo;
    ctx.fill();

    // Corps principal du cratère : surface lunaire gris-bleuté
    const bodyGrad = ctx.createRadialGradient(sx - r*0.3, sy - r*0.3, r*0.1, sx, sy, r);
    bodyGrad.addColorStop(0,   '#4a5060');
    bodyGrad.addColorStop(0.6, '#2a2e38');
    bodyGrad.addColorStop(1,   '#141620');
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Bord du cratère : liseré lumineux
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(140, 160, 200, ${0.5 + Math.sin(t) * 0.15})`;
    ctx.lineWidth   = 3;
    ctx.stroke();

    // Impact central : creux sombre + reflet
    const impactR = r * 0.42;
    const impact  = ctx.createRadialGradient(sx, sy, 0, sx, sy, impactR);
    impact.addColorStop(0,   '#080a10');
    impact.addColorStop(0.7, '#111420');
    impact.addColorStop(1,   '#2a2e38');
    ctx.beginPath();
    ctx.arc(sx, sy, impactR, 0, Math.PI * 2);
    ctx.fillStyle = impact;
    ctx.fill();

    // Reflet lumineux sur le bord haut-gauche de l'impact
    ctx.beginPath();
    ctx.arc(sx - impactR * 0.35, sy - impactR * 0.35, impactR * 0.22, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180, 200, 255, 0.18)';
    ctx.fill();

    // Petits cratères secondaires
    obs.subCraters.forEach(sc => {
      const scx = sx + sc.dx;
      const scy = sy + sc.dy;
      // S'assurer qu'ils restent dans le corps principal
      const dist = Math.hypot(sc.dx, sc.dy);
      if (dist + sc.r > r * 0.9) return;
      ctx.beginPath();
      ctx.arc(scx, scy, sc.r, 0, Math.PI * 2);
      ctx.fillStyle = '#0d0f16';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(scx, scy, sc.r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(100, 120, 160, 0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });

    // Indicateur de zone lente : texte discret
    ctx.fillStyle = `rgba(120, 180, 255, ${0.3 + Math.sin(t * 2) * 0.15})`;
    ctx.font      = '11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('ZONE LENTE', sx, sy + r + 14);
    ctx.textAlign = 'left';
  }

  // ── Rendu minimap statique ──
  function renderMinimapStatic() {
    minimapStaticCtx.clearRect(0, 0, 150, 150);
    const sx = 150 / worldWidth, sy = 150 / worldHeight;
    orbs.forEach(o => {
      minimapStaticCtx.fillStyle = o.bonusType ? '#ff00ff' : '#00ffff';
      minimapStaticCtx.beginPath();
      minimapStaticCtx.arc(o.x * sx, o.y * sy, 3, 0, Math.PI * 2);
      minimapStaticCtx.fill();
    });
    obstacles.forEach(o => {
      minimapStaticCtx.fillStyle = o.type === 'blackhole' ? '#8800ff' : '#5588aa';
      minimapStaticCtx.beginPath();
      minimapStaticCtx.arc(o.x * sx, o.y * sy, o.type === 'blackhole' ? 6 : 5, 0, Math.PI * 2);
      minimapStaticCtx.fill();
    });
  }

  // ── Entrées ──
  document.addEventListener('mousemove', e => {
    if (!isTouching) { mouse.x = e.clientX; mouse.y = e.clientY; mouseMoved = true; }
  });
  canvas.addEventListener('touchstart', e => {
    isTouching = true;
    if (e.touches.length > 0) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouseMoved = true; }
  });
  canvas.addEventListener('touchmove', e => {
    if (e.touches.length > 0) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouseMoved = true; }
  });
  canvas.addEventListener('touchend', () => { isTouching = false; });

  // ── Étoile filante ──
  function drawStar(x, y, spikes, outerR, innerR, color, alpha) {
    let rot  = Math.PI / 2 * 3;
    const step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(x, y - outerR);
    for (let i = 0; i < spikes; i++) {
      ctx.lineTo(x + Math.cos(rot) * outerR, y + Math.sin(rot) * outerR); rot += step;
      ctx.lineTo(x + Math.cos(rot) * innerR, y + Math.sin(rot) * innerR); rot += step;
    }
    ctx.lineTo(x, y - outerR);
    ctx.closePath();
    ctx.fillStyle = color; ctx.shadowColor = color;
    ctx.shadowBlur = 20; ctx.globalAlpha = alpha;
    ctx.fill(); ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }

  // ── Météorite ──
  function drawMeteor(x, y, radius) {
    ctx.beginPath(); ctx.fillStyle = 'orange';
    ctx.shadowColor = 'orangered'; ctx.shadowBlur = 15;
    ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.strokeStyle = 'orangered';
    ctx.lineWidth = 6; ctx.shadowColor = 'orangered'; ctx.shadowBlur = 10;
    ctx.moveTo(x - radius * 1.5, y + radius * 0.2);
    ctx.lineTo(x - radius * 3,   y + radius * 1.5);
    ctx.stroke(); ctx.shadowBlur = 0;
  }

  // ── Barrière ──
  function drawBarrier() {
    ctx.strokeStyle = 'red'; ctx.lineWidth = 30;
    ctx.setLineDash([20, 20]);
    ctx.strokeRect(-camera.x, -camera.y, worldWidth, worldHeight);
    ctx.setLineDash([]);
  }

  // ── Minimap dynamique ──
  function drawMinimap() {
    minimapCtx.clearRect(0, 0, 150, 150);
    minimapCtx.drawImage(minimapStatic, 0, 0);
    // Mettre à jour les positions des obstacles sur la minimap
    const sx = 150 / worldWidth, sy = 150 / worldHeight;
    obstacles.forEach(o => {
      minimapCtx.fillStyle = o.type === 'blackhole' ? '#8800ff' : '#5588aa';
      minimapCtx.beginPath();
      minimapCtx.arc(o.x * sx, o.y * sy, o.type === 'blackhole' ? 6 : 5, 0, Math.PI * 2);
      minimapCtx.fill();
    });
    // Tête
    minimapCtx.fillStyle = '#00ffff';
    minimapCtx.beginPath();
    minimapCtx.arc(snake[0].x * sx, snake[0].y * sy, 7, 0, Math.PI * 2);
    minimapCtx.fill();
  }

  // ── Collisions ──
  function circleCollision(x1,y1,r1,x2,y2,r2) { return Math.hypot(x2-x1,y2-y1)<r1+r2; }

  // ══════════════════════════════════════════════════════
  // ── LOGIQUE OBSTACLES ──
  // Trou noir : attraction progressive → mort au contact
  // Cratère   : ralentissement si dans la zone lente, mort si touche le cratère
  // ══════════════════════════════════════════════════════
  function handleObstacleEffects(head) {
    slowActive = false; // reset chaque frame, le cratère le réactive si dedans

    for (let obs of obstacles) {
      const dist = Math.hypot(head.x - obs.x, head.y - obs.y);

      if (obs.type === 'blackhole') {
        // Zone d'attraction : dévie la trajectoire vers le centre
        if (dist < obs.pullRadius && dist > obs.radius + 14) {
          const force   = 1 - (dist / obs.pullRadius); // plus fort près du centre
          const pullStr = force * force * 2.8;
          const nx      = (obs.x - head.x) / dist;
          const ny      = (obs.y - head.y) / dist;
          // Mélange direction actuelle + attraction gravitationnelle
          lastDirection.dx = lastDirection.dx * (1 - pullStr * 0.12) + nx * pullStr * 0.12;
          lastDirection.dy = lastDirection.dy * (1 - pullStr * 0.12) + ny * pullStr * 0.12;
          // Renormaliser
          const len = Math.hypot(lastDirection.dx, lastDirection.dy);
          if (len > 0) { lastDirection.dx /= len; lastDirection.dy /= len; }
        }
        // Contact = mort
        if (dist < obs.radius + 14) { restartGame(); return true; }

      } else if (obs.type === 'crater') {
        // Zone lente
        if (dist < obs.slowRadius) {
          slowActive  = true;
          slowTimer   = 5; // prolongé tant qu'on est dedans
        }
        // Contact corps = mort
        if (dist < obs.radius + 14) { restartGame(); return true; }
      }
    }
    return false;
  }

  // ── Boucle principale ──
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frameCount++;

    const head = { ...snake[0] };

    if (head.x < 0 || head.x > worldWidth || head.y < 0 || head.y > worldHeight) {
      restartGame(); return;
    }

    // Direction souris
    if (mouseMoved) {
      const wx   = camera.x + mouse.x, wy = camera.y + mouse.y;
      const dx   = wx - head.x,        dy = wy - head.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0) { lastDirection.dx = dx / dist; lastDirection.dy = dy / dist; }
      mouseMoved = false;
    }

    // Vitesse avec effets cumulatifs
    speed = baseSpeed;
    if (bonusActive)    speed *= 1.8;
    if (growFastActive) speed *= 1.3;
    if (slowActive)     speed *= 0.45; // cratère ralentit fortement

    head.x += lastDirection.dx * speed;
    head.y += lastDirection.dy * speed;
    snake.unshift(head);

    let maxLength = Math.min(50 + score + (growFastActive ? 30 : 0), MAX_SNAKE_LENGTH);
    while (snake.length > maxLength) snake.pop();

    // Collision orbes
    orbs = orbs.filter(orb => {
      if (Math.hypot(orb.x - head.x, orb.y - head.y) < orb.radius + 10) {
        score += orb.bonusType === 'speed' ? 2 : orb.bonusType === 'growFast' ? 3 : 1;
        scoreEl.textContent = 'Score: ' + score;
        if (orb.bonusType === 'speed')    { bonusActive = true;    bonusTimer = 600; }
        if (orb.bonusType === 'growFast') { growFastActive = true; growFastTimer = 600; }
        return false;
      }
      return true;
    });

    // Mise à jour positions obstacles + effets
    updateObstacles();
    if (handleObstacleEffects(head)) return;

    // Timers bonus
    if (bonusActive)    { if (--bonusTimer    <= 0) bonusActive    = false; }
    if (growFastActive) { if (--growFastTimer <= 0) growFastActive = false; }
    if (slowTimer > 0)  { slowTimer--; if (slowTimer <= 0) slowActive = false; }

    while (orbs.length < orbCount) orbs.push(createOrb());

    camera.x = head.x - canvas.width  / 2;
    camera.y = head.y - canvas.height / 2;

    // Fond — légère teinte violette si attraction de trou noir proche
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawBarrier();

    // ── Dessin obstacles (sous les orbes et le serpent) ──
    obstacles.forEach(obs => {
      if (!isVisible(obs.x, obs.y, obs.pullRadius || obs.slowRadius || 100)) return;
      if (obs.type === 'blackhole') drawBlackhole(obs);
      else                          drawCrater(obs);
    });

    // ── Orbes ──
    orbs.forEach(orb => {
      if (!isVisible(orb.x, orb.y)) return;
      if (orb.shape === 'star')        drawStar(orb.x-camera.x, orb.y-camera.y, 8, orb.radius, orb.radius/2, '#ff00ff', orb.alpha);
      else if (orb.shape === 'meteor') drawMeteor(orb.x-camera.x, orb.y-camera.y, orb.radius);
      else {
        ctx.beginPath();
        ctx.arc(orb.x-camera.x, orb.y-camera.y, orb.radius, 0, Math.PI*2);
        ctx.fillStyle='#00ffff'; ctx.shadowColor='#00ffff'; ctx.shadowBlur=10;
        ctx.fill(); ctx.shadowBlur=0;
      }
    });

    // ── Serpent : corps arc-en-ciel ──
    const snakeRadius = 14;
    ctx.shadowColor = '#fff';
    ctx.shadowBlur  = 10;
    snake.forEach((seg, i) => {
      ctx.beginPath();
      ctx.arc(seg.x - camera.x, seg.y - camera.y, snakeRadius, 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${(i * 10 + score * 5) % 360}, 100%, 50%)`;
      ctx.fill();
    });
    ctx.shadowBlur = 0;

    // ── Tête : yeux + bouche (rendu séparé, au-dessus du corps) ──
    const hs  = snake[0];
    const hx  = hs.x - camera.x, hy = hs.y - camera.y;
    const ang = Math.atan2(lastDirection.dy, lastDirection.dx);
    const eox = 14, eoy = -14, er = 12, po = 4;

    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(hx-eox, hy+eoy, er, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx+eox, hy+eoy, er, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(hx-eox+Math.cos(ang)*po, hy+eoy+Math.sin(ang)*po, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx+eox+Math.cos(ang)*po, hy+eoy+Math.sin(ang)*po, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(hx-6, hy+16); ctx.lineTo(hx+6, hy+16); ctx.stroke();

    // ── Barre de statut ──
    let status = '';
    if (bonusActive)    status += '⚡ VITESSE x1.8  ';
    if (growFastActive) status += '🌱 CROISSANCE+   ';
    if (slowActive)     status += '🌑 ZONE LENTE…   ';
    statusBar.textContent = status;

    drawMinimap();
  }

  function stopLoop() {
    if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
  }

  function restartGame() {
    stopLoop(); gameRunning = false;
    gameOverEl.style.display = 'flex';
  }

  function loop() {
    if (!gameRunning) return;
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function initGame() {
    score = 0; frameCount = 0;
    snake = [{ x: worldWidth/2, y: worldHeight/2 }];
    lastDirection = { dx:1, dy:0 };
    orbs = []; for (let i=0;i<orbCount;i++) orbs.push(createOrb());
    obstacles = []; for (let i=0;i<obstacleCount;i++) obstacles.push(createObstacle());
    bonusActive=false; bonusTimer=0;
    growFastActive=false; growFastTimer=0;
    slowActive=false; slowTimer=0;
    speed=baseSpeed; mouseMoved=false;
    renderMinimapStatic();
  }

  function saveScore(name, s) {
    let scores = JSON.parse(localStorage.getItem('neonSnakeScores')) || [];
    scores.push({ name, score:s }); scores.sort((a,b)=>b.score-a.score);
    if (scores.length>5) scores=scores.slice(0,5);
    localStorage.setItem('neonSnakeScores', JSON.stringify(scores));
  }

  function displayHighscores() {
    let scores = JSON.parse(localStorage.getItem('neonSnakeScores')) || [];
    if (!scores.length) { highscoresEl.innerHTML='<b>Top Scores :</b><br>Pas encore de scores'; return; }
    let html = '<b>Top Scores :</b><br><ol>';
    scores.forEach(s => { html+=`<li>${s.name}: ${s.score}</li>`; });
    highscoresEl.innerHTML = html + '</ol>';
  }

  document.getElementById('start-button').addEventListener('click', () => {
    startScreenEl.style.opacity='0';
    setTimeout(() => {
      startScreenEl.style.display='none';
      scoreEl.style.display=statusBar.style.display=volumeControl.style.display='block';
      scoreEl.textContent='Score: 0';
      displayHighscores(); initGame(); gameRunning=true; loop();
    }, 1000);
  });

  document.getElementById('replay-button').addEventListener('click', () => {
    const name = playerNameEl.value.trim() || 'Anonyme';
    saveScore(name, score);
    playerNameEl.value=''; gameOverEl.style.display='none';
    scoreEl.textContent='Score: 0'; displayHighscores();
    stopLoop(); initGame(); gameRunning=true; loop();
  });

  window.addEventListener('resize', () => {
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    minimapEl.width=minimapEl.height=150;
  });
  window.dispatchEvent(new Event('resize'));
</script>
</body>
